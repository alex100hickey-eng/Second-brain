<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #0f1520;
    --line: #1c2534;
    --text: #e7ecf5;
    --text-dim: #6b7688;
    --accent: #3fd0ff;
    --accent-dim: #1a4a5c;
    --user-bubble: #16202f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dim);
    gap: 8px;
  }

  .empty-state .glyph {
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .msg {
    display: flex;
    margin-bottom: 16px;
  }

  .msg.user { justify-content: flex-end; }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 10px;
    line-height: 1.5;
    font-size: 14.5px;
    white-space: pre-wrap;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid var(--line);
  }

  .msg.assistant .bubble {
    background: transparent;
    border-left: 2px solid var(--accent-dim);
    border-radius: 0;
    padding-left: 14px;
  }

  .thinking {
    display: flex;
    gap: 4px;
    padding: 12px 0;
  }

  .thinking span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite ease-in-out;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  form {
    padding: 18px 24px 24px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px 6px 6px 16px;
  }

  .input-row:focus-within {
    border-color: var(--accent-dim);
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14.5px;
    padding: 10px 0;
  }

  input[type="text"]::placeholder {
    color: var(--text-dim);
  }

  button {
    background: var(--accent);
    color: #05171d;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  @media (max-width: 480px) {
    .bubble { max-width: 88%; }
    header { padding: 14px 16px; }
    main { padding: 16px; }
    form { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="pulse"></div>
    <span>Second Brain</span>
  </div>
  <div class="title" id="status">Online</div>
</header>

<main id="chat">
  <div class="empty-state" id="empty-state">
    <div class="glyph">Standing by</div>
    <div>Ask about your agents, log a note, or just talk.</div>
  </div>
</main>

<form id="chat-form">
  <div class="input-row">
    <input type="text" id="message-input" placeholder="Ask or tell me something..." autocomplete="off" />
    <button type="submit" id="send-btn">Send</button>
  </div>
</form>

<script>
  const chat = document.getElementById('chat');
  const emptyState = document.getElementById('empty-state');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const status = document.getElementById('status');

  let history = [];

  function addMessage(role, text) {
    if (emptyState) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function addThinking() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'thinking-indicator';
    wrap.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-indicator');
    if (el) el.remove();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addMessage('user', message);
    input.value = '';
    sendBtn.disabled = true;
    status.textContent = 'Thinking...';
    addThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history }),
      });
      const data = await res.json();

      removeThinking();

      if (data.error) {
        addMessage('assistant', `Something went wrong: ${data.error}`);
      } else {
        addMessage('assistant', data.reply);
        history.push({ role: 'user', content: message });
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      removeThinking();
      addMessage('assistant', 'Connection error — check that the server is running.');
    } finally {
      sendBtn.disabled = false;
      status.textContent = 'Online';
      input.focus();
    }
  });

  input.focus();
</script>

</body>
</html>
