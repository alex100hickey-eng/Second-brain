<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Second Brain</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jarvis">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #0f1520;
    --line: #1c2534;
    --text: #e7ecf5;
    --text-dim: #6b7688;
    --accent: #3fd0ff;
    --accent-dim: #1a4a5c;
    --user-bubble: #16202f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  header nav {
    display: flex;
    align-items: center;
  }

  header nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    margin-left: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid transparent;
  }

  header nav a.active {
    color: var(--accent);
    border-color: var(--accent-dim);
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dim);
    gap: 8px;
  }

  .empty-state .glyph {
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .msg {
    display: flex;
    margin-bottom: 16px;
  }

  .msg.user { justify-content: flex-end; }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 10px;
    line-height: 1.5;
    font-size: 14.5px;
    white-space: pre-wrap;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid var(--line);
  }

  .msg.assistant .bubble {
    background: transparent;
    border-left: 2px solid var(--accent-dim);
    border-radius: 0;
    padding-left: 14px;
    white-space: normal;
  }

  .bubble h1, .bubble h2, .bubble h3 {
    font-size: 15px;
    margin: 14px 0 6px;
    color: var(--accent);
  }
  .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child { margin-top: 0; }
  .bubble p { margin: 8px 0; }
  .bubble p:first-child { margin-top: 0; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 8px 0; padding-left: 22px; }
  .bubble li { margin: 3px 0; }
  .bubble code {
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 13px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .bubble pre {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .bubble pre code { background: none; border: none; padding: 0; }
  .bubble a { color: var(--accent); }

  .nav-badge {
    display: inline-block;
    min-width: 18px;
    text-align: center;
    background: #4a3a1a;
    color: #ffb454;
    font-size: 11px;
    font-weight: 700;
    border-radius: 20px;
    padding: 1px 6px;
    margin-left: 5px;
    vertical-align: 1px;
  }

  .tool-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0 6px 14px;
    color: var(--accent);
    font-family: "SF Mono", "Courier New", monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    animation: statusPulse 1.6s ease-in-out infinite;
  }

  .tool-status::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }

  .thinking {
    display: flex;
    gap: 4px;
    padding: 12px 0;
  }

  .thinking span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite ease-in-out;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  form {
    padding: 18px 24px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px 6px 6px 16px;
  }

  .input-row:focus-within {
    border-color: var(--accent-dim);
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14.5px;
    padding: 10px 0;
  }

  input[type="text"]::placeholder {
    color: var(--text-dim);
  }

  button {
    background: var(--accent);
    color: #05171d;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* Voice: mic button in the input row + spoken-replies toggle in the nav */
  .mic-btn {
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    color: var(--text-dim);
  }

  .mic-btn.listening {
    border-color: #ff5c5c;
    color: #ff5c5c;
    animation: micPulse 1.2s ease-in-out infinite;
  }

  /* Attached-video chip shown above the input row */
  .attach-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    max-width: fit-content;
  }
  .attach-chip.uploading { opacity: 0.6; }
  .attach-chip button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0 2px;
  }

  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 92, 92, 0.5); }
    50% { box-shadow: 0 0 0 6px rgba(255, 92, 92, 0); }
  }

  @media (max-width: 480px) {
    .bubble { max-width: 88%; }
    header { padding: 14px 16px; }
    main { padding: 16px; }
    form {
      padding: 12px 16px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
    .title { display: none; }  /* hide "Online" text — the pulse dot says it */
    .brand span { white-space: nowrap; }
    header nav a { padding: 6px 8px; margin-left: 2px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="pulse"></div>
    <span>Second Brain</span>
  </div>
  <div style="display: flex; align-items: center; gap: 4px;">
    <div class="title" id="status">Online</div>
    <nav>
      <a href="/" class="active">Chat</a>
      <a href="/dashboard">Dashboard<span class="nav-badge" id="pending-badge" style="display:none"></span></a>
      <a href="/memory" title="Browse & search everything you've discussed">Memory</a>
      <a href="#" id="voice-toggle" title="Toggle spoken replies">Voice</a>
      <a href="#" id="clear-chat" title="Start a fresh conversation">Clear</a>
    </nav>
  </div>
</header>

<main id="chat">
  <div class="empty-state" id="empty-state">
    <div class="glyph">Standing by</div>
    <div>Ask about your agents, log a note, or just talk.</div>
  </div>
</main>

<form id="chat-form">
  <div class="attach-chip" id="attach-chip" style="display:none">
    <span id="attach-label"></span>
    <button type="button" id="attach-clear" title="Remove attachment">&times;</button>
  </div>
  <div class="input-row">
    <input type="text" id="message-input" placeholder="Ask or tell me something..." autocomplete="off" />
    <input type="file" id="video-input" accept="video/mp4,video/quicktime,video/webm,video/x-matroska,video/x-msvideo,.mp4,.mov,.webm,.mkv,.avi,.m4v" style="display:none" />
    <button type="button" class="mic-btn" id="attach-btn" title="Attach a video to analyze">&#128206;</button>
    <button type="button" class="mic-btn" id="mic-btn" title="Hold a conversation — tap and speak">&#127908;</button>
    <button type="submit" id="send-btn">Send</button>
  </div>
</form>

<script>
  const chat = document.getElementById('chat');
  const emptyState = document.getElementById('empty-state');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('message-input');

  // Dashboard quick actions link here with ?q=… to pre-fill (not auto-send) the box.
  (function prefillFromQuery() {
    try {
      const q = new URLSearchParams(location.search).get('q');
      if (q) {
        input.value = q;
        setTimeout(() => { input.focus(); input.setSelectionRange(q.length, q.length); }, 60);
        history.replaceState(null, '', location.pathname);
      }
    } catch (e) { /* ignore */ }
  })();
  const sendBtn = document.getElementById('send-btn');
  const status = document.getElementById('status');

  // Conversation lives on the server (shared across all devices) — load it.
  (async () => {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      for (const msg of data.messages || []) addMessage(msg.role, msg.content);
    } catch (e) { /* server unreachable — start empty */ }
  })();

  // Minimal safe markdown: escape all HTML first, then apply formatting.
  function renderMarkdown(text) {
    let s = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // fenced code blocks first, so nothing inside them gets formatted
    const blocks = [];
    s = s.replace(/```(?:\w*)\n?([\s\S]*?)```/g, (_, code) => {
      blocks.push(`<pre><code>${code}</code></pre>`);
      return `\x00BLOCK${blocks.length - 1}\x00`;
    });

    s = s
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // group consecutive "- " lines into lists, wrap other runs in <p>
    const lines = s.split('\n');
    const out = [];
    let inList = false, para = [];
    const flushPara = () => {
      if (para.length) { out.push(`<p>${para.join('<br>')}</p>`); para = []; }
    };
    for (const line of lines) {
      const li = line.match(/^\s*[-*] (.+)$/);
      const isBlock = /^(<h\d|\x00BLOCK)/.test(line.trim());
      if (li) {
        flushPara();
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push(`<li>${li[1]}</li>`);
      } else {
        if (inList) { out.push('</ul>'); inList = false; }
        if (isBlock) { flushPara(); out.push(line.trim()); }
        else if (line.trim() === '') flushPara();
        else para.push(line);
      }
    }
    flushPara();
    if (inList) out.push('</ul>');
    s = out.join('');

    return s.replace(/\x00BLOCK(\d+)\x00/g, (_, i) => blocks[+i]);
  }

  function addMessage(role, text) {
    if (emptyState) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'assistant') bubble.innerHTML = renderMarkdown(text);
    else bubble.textContent = text;
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  // Pending-approvals badge on the Dashboard nav link
  async function refreshBadge() {
    try {
      const res = await fetch('/api/dashboard');
      const data = await res.json();
      const n = (data.pending_actions || []).length;
      const badge = document.getElementById('pending-badge');
      badge.textContent = n;
      badge.style.display = n ? 'inline-block' : 'none';
    } catch (e) { /* ignore */ }
  }
  refreshBadge();
  setInterval(refreshBadge, 60000);

  function addThinking() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.id = 'thinking-indicator';
    wrap.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-indicator');
    if (el) el.remove();
  }

  function showToolStatus(label) {
    removeToolStatus();
    const el = document.createElement('div');
    el.className = 'tool-status';
    el.id = 'tool-status';
    el.textContent = label;
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeToolStatus() {
    const el = document.getElementById('tool-status');
    if (el) el.remove();
  }

  // ---- Video attachment ----
  const videoInput = document.getElementById('video-input');
  const attachBtn = document.getElementById('attach-btn');
  const attachChip = document.getElementById('attach-chip');
  const attachLabel = document.getElementById('attach-label');
  const attachClear = document.getElementById('attach-clear');
  let attachedVideo = null;  // server-side filename once uploaded

  function clearAttachment() {
    attachedVideo = null;
    attachChip.style.display = 'none';
    attachChip.classList.remove('uploading');
    videoInput.value = '';
  }
  attachBtn.addEventListener('click', () => videoInput.click());
  attachClear.addEventListener('click', clearAttachment);
  videoInput.addEventListener('change', async () => {
    const file = videoInput.files[0];
    if (!file) return;
    attachChip.style.display = 'flex';
    attachChip.classList.add('uploading');
    attachLabel.textContent = 'Uploading ' + file.name + '…';
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch('/api/upload_video', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Upload failed');
      attachedVideo = data.filename;
      attachChip.classList.remove('uploading');
      attachLabel.textContent = '🎬 ' + attachedVideo;
      if (!input.value.trim()) input.placeholder = 'What should I do with this video?';
      input.focus();
    } catch (err) {
      attachLabel.textContent = 'Upload failed: ' + err.message;
      attachedVideo = null;
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let message = input.value.trim();
    // A video can be sent with just an implied instruction.
    if (!message && attachedVideo) message = 'Take a look at this video and tell me what it is.';
    if (!message) return;

    const displayMessage = attachedVideo ? (message + '\n\n🎬 ' + attachedVideo) : message;
    let outboundMessage = message;
    if (attachedVideo) {
      outboundMessage = message + '\n\n[Attached video in my inbox — filename: "' + attachedVideo +
        '". Use the analyze_video tool on it to answer.]';
    }

    addMessage('user', displayMessage);
    clearAttachment();
    input.placeholder = 'Ask or tell me something...';
    input.value = '';
    sendBtn.disabled = true;
    status.textContent = 'Thinking...';
    addThinking();

    let bubble = null;
    let fullText = '';

    function handleEvent(ev) {
      if (ev.type === 'text') {
        removeThinking();
        removeToolStatus();
        if (!bubble) bubble = addMessage('assistant', '');
        fullText += ev.delta;
        bubble.innerHTML = renderMarkdown(fullText);
        chat.scrollTop = chat.scrollHeight;
      } else if (ev.type === 'status') {
        removeThinking();
        status.textContent = 'Working...';
        showToolStatus(ev.label);
      } else if (ev.type === 'error') {
        removeThinking();
        removeToolStatus();
        addMessage('assistant', `Something went wrong: ${ev.message}`);
      }
    }

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: outboundMessage }),
      });

      if (!res.ok) {
        removeThinking();
        removeToolStatus();
        if (res.status === 401) {
          addMessage('assistant', 'Your session expired. Reloading the login page…');
          setTimeout(() => { location.href = '/login'; }, 1600);
        } else {
          addMessage('assistant', `The server returned an error (${res.status}). Your message is back in the box below — hit Send to try again.`);
          input.value = message;
        }
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) handleEvent(JSON.parse(line));
        }
      }

      removeThinking();
      removeToolStatus();
      if (voiceOn && fullText) speak(fullText);
    } catch (err) {
      removeThinking();
      removeToolStatus();
      addMessage('assistant', 'Connection error — your message was not lost, it\'s back in the box below. Hit Send to retry.');
      input.value = message;
    } finally {
      sendBtn.disabled = false;
      status.textContent = 'Online';
      input.focus();
    }
  });

  // ===== VOICE (v1) =====
  // Push-to-talk transcribes LOCALLY with whisper.cpp: the mic records audio and
  // POSTs it to /api/transcribe, which runs the local Whisper model (no cloud) and
  // returns text that we drop into the input box for Alex to review and send. Spoken
  // replies use the browser's built-in voices by default (portable, works remotely);
  // the app also exposes /api/speak for the Mac's own `say` when it's the local machine.
  const micBtn = document.getElementById('mic-btn');
  const voiceToggle = document.getElementById('voice-toggle');
  const canRecord = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
  const canSpeak = 'speechSynthesis' in window;
  let voiceOn = canSpeak && localStorage.getItem('jarvis-voice') === 'on';
  let recording = false;
  let mediaRecorder = null, chunks = [], micStream = null;

  function updateVoiceUI() {
    voiceToggle.classList.toggle('active', voiceOn);
    micBtn.classList.toggle('listening', recording);
    micBtn.title = recording ? 'Recording — tap to stop & transcribe' : 'Tap and speak (local transcription)';
  }

  // Turn markdown into something worth hearing.
  function speechText(md) {
    return md
      .replace(/```[\s\S]*?```/g, ' (code shown on screen) ')
      .replace(/`([^`\n]+)`/g, '$1')
      .replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
      .replace(/^#{1,3} /gm, '')
      .replace(/\*\*?|__?/g, '')
      .replace(/^\s*[-*] /gm, '')
      .trim();
  }

  function speak(md) {
    if (!canSpeak) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(speechText(md));
    u.rate = 1.05;
    const voice = speechSynthesis.getVoices().find(v => v.lang.startsWith('en') && v.localService)
      || speechSynthesis.getVoices().find(v => v.lang.startsWith('en'));
    if (voice) u.voice = voice;
    speechSynthesis.speak(u);
  }

  if (canSpeak) speechSynthesis.getVoices(); // warm the voice list (loads async)

  voiceToggle.addEventListener('click', (e) => {
    e.preventDefault();
    if (!canSpeak) return;
    voiceOn = !voiceOn;
    localStorage.setItem('jarvis-voice', voiceOn ? 'on' : 'off');
    if (!voiceOn) speechSynthesis.cancel();
    updateVoiceUI();
  });

  async function transcribeBlob(blob) {
    const fd = new FormData();
    fd.append('audio', blob, 'clip.webm');
    input.placeholder = 'Transcribing…';
    try {
      const res = await fetch('/api/transcribe', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.text) {
        input.value = (input.value ? input.value + ' ' : '') + data.text;
        input.focus();
      } else {
        input.placeholder = data.note ? ('Didn\'t catch that — ' + data.note) : 'Didn\'t catch that. Try again.';
      }
    } catch (err) {
      input.placeholder = 'Transcription failed — type instead.';
    } finally {
      setTimeout(() => { input.placeholder = 'Ask or tell me something...'; }, 2500);
    }
  }

  async function startRecording() {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      input.placeholder = 'Mic permission needed — allow it and try again.';
      setTimeout(() => { input.placeholder = 'Ask or tell me something...'; }, 3000);
      return;
    }
    chunks = [];
    mediaRecorder = new MediaRecorder(micStream);
    mediaRecorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      if (chunks.length) transcribeBlob(new Blob(chunks, { type: 'audio/webm' }));
    };
    mediaRecorder.start();
    recording = true;
    updateVoiceUI();
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    recording = false;
    updateVoiceUI();
  }

  if (!canRecord) {
    micBtn.style.display = 'none'; // no mic API here — typing (incl. dictation tools) still works
  } else {
    micBtn.addEventListener('click', () => {
      if (recording) stopRecording();
      else { speechSynthesis && speechSynthesis.cancel(); startRecording(); }
    });
  }
  if (!canSpeak) voiceToggle.style.display = 'none';
  updateVoiceUI();

  document.getElementById('clear-chat').addEventListener('click', async (e) => {
    e.preventDefault();
    try { await fetch('/api/history/clear', { method: 'POST' }); } catch (err) {}
    location.reload();
  });

  input.focus();
</script>

</body>
</html>
