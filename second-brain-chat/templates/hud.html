<style>
/* ============================================================
   CLARVIS HUD — visual recreation of the reference concept art.
   Stage 1: the LOOK (this file). Stage 2 wires chat/data back in.
   One SVG scene (1600x1000) = exact compositional control.
   ============================================================ */
html, body { height: 100%; margin: 0; background: #041028; overflow: hidden; }
#scene { width: 100vw; height: 100vh; height: 100dvh; display: block; }

/* ---- animation: the machine is alive, the art stays faithful ---- */
.spin-slow    { transform-origin: 800px 470px; animation: rot 140s linear infinite; }
.spin-blades  { transform-origin: 800px 470px; animation: rot 90s linear infinite reverse; }
.spin-mid     { transform-origin: 800px 470px; animation: rot 60s linear infinite; }
.spin-inner   { transform-origin: 800px 470px; animation: rot 36s linear infinite reverse; }
@keyframes rot { to { transform: rotate(360deg); } }
.core-pulse { transform-origin: 800px 470px; animation: pulse 3.2s ease-in-out infinite; }
@keyframes pulse { 50% { transform: scale(1.06); opacity: .92; } }
/* full trace always visible; a bright "sweep" window travels along it */
.ecg-line { opacity: .95; }
.ecg-sweep { stroke-dasharray: 70 620; animation: ecg 3.4s linear infinite; }
@keyframes ecg { from { stroke-dashoffset: 690; } to { stroke-dashoffset: 0; } }
.chev { animation: chevflow 1.6s linear infinite; }
.chev:nth-child(2) { animation-delay: .2s; } .chev:nth-child(3) { animation-delay: .4s; }
.chev:nth-child(4) { animation-delay: .6s; } .chev:nth-child(5) { animation-delay: .8s; }
.chev:nth-child(6) { animation-delay: 1.0s; }
@keyframes chevflow { 0%, 100% { opacity: .25; } 30% { opacity: 1; } }
.blink-soft { animation: bl 2.8s ease-in-out infinite; }
@keyframes bl { 50% { opacity: .45; } }
.loader-arc { transform-origin: 1382px 838px; animation: rot 5s linear infinite; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>

<script>
  // ---- generated geometry (ticks, blades, donuts, matrices) ----
  const NS = 'http://www.w3.org/2000/svg';
  const put = (parent, tag, attrs) => {
    const el = document.createElementNS(NS, tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    document.getElementById(parent).appendChild(el);
    return el;
  };
  const P = (cx, cy, r, a) => [cx + r * Math.sin(a), cy - r * Math.cos(a)];

  // outer reticle ticks — 72 around, every 6th long
  for (let i = 0; i < 72; i++) {
    const a = i / 72 * 2 * Math.PI;
    const [x1, y1] = P(800, 470, i % 6 === 0 ? 234 : 242, a);
    const [x2, y2] = P(800, 470, 252, a);
    put('oticks', 'line', { x1, y1, x2, y2, opacity: i % 6 === 0 ? .9 : .45 });
  }
  // aperture blades — 12 petals, plus a fine ring inside them
  for (let i = 0; i < 12; i++) {
    put('blades', 'use', { href: '#blade',
      transform: `rotate(${i * 30} 800 470) translate(800 470)` });
  }
  put('blades', 'circle', { cx: 800, cy: 470, r: 192, fill: 'none',
    stroke: 'rgba(79,199,242,.35)', 'stroke-width': 1 });
  put('blades', 'circle', { cx: 800, cy: 470, r: 154, fill: 'none',
    stroke: 'rgba(79,199,242,.25)', 'stroke-width': 1, 'stroke-dasharray': '10 6' });
  // TL donuts: 40 / 50 / 70 %
  [[86, 158, 40], [166, 148, 50], [248, 136, 70]].forEach(([cx, cy, pct]) => {
    const C = 2 * Math.PI * 24;
    put('donuts', 'circle', { cx, cy, r: 24, fill: 'none',
      stroke: 'rgba(79,199,242,.25)', 'stroke-width': 6 });
    put('donuts', 'circle', { cx, cy, r: 24, fill: 'none', stroke: '#4FC7F2',
      'stroke-width': 6, 'stroke-linecap': 'round',
      'stroke-dasharray': `${C * pct / 100} ${C}`,
      transform: `rotate(-90 ${cx} ${cy})` });
    const t = put('donuts', 'text', { x: cx - 13, y: cy + 4, 'font-size': 11, fill: '#BFEFFF' });
    t.textContent = pct + '%';
  });
  // TL dot matrix — 14 x 5
  for (let r = 0; r < 5; r++) for (let c = 0; c < 14; c++) {
    put('dotmatrixTL', 'rect', { x: 44 + c * 13, y: 232 + r * 13, width: 6, height: 6,
      fill: (r * 14 + c) % 7 < 4 ? 'rgba(79,199,242,.75)' : 'rgba(79,199,242,.18)' });
  }
  // sail: triangle wireframe + vertical hatch
  put('sail', 'path', { d: 'M 66 462 L 150 352 L 150 462 Z', fill: 'rgba(79,199,242,.14)',
    stroke: '#4FC7F2', 'stroke-width': 1.5 });
  for (let i = 1; i < 7; i++) {
    const x = 150 - i * 12;
    const yTop = 352 + (462 - 352) * (i * 12) / (150 - 66);
    put('sail', 'line', { x1: x, y1: 462, x2: x, y2: yTop,
      stroke: 'rgba(79,199,242,.5)', 'stroke-width': 1 });
  }
  // schematic ruler ticks
  for (let i = 0; i < 12; i++)
    put('schemticks', 'line', { x1: 162 + i * 13, y1: 748, x2: 162 + i * 13, y2: 754,
      stroke: 'rgba(79,199,242,.5)', 'stroke-width': 1 });
  // mini bars bottom-left
  const bh = [10, 22, 14, 30, 18, 26, 12, 34, 20, 28];
  bh.forEach((h, i) => put('minibars', 'rect',
    { x: 160 + i * 16, y: 916 - h, width: 9, height: h, fill: 'rgba(79,199,242,.6)' }));
  // banner hatch rows
  for (let i = 0; i < 34; i++)
    put('hatchrow', 'line', { x1: 590 + i * 11, y1: 56, x2: 584 + i * 11, y2: 84,
      stroke: i % 5 === 0 ? '#7FDCFB' : 'rgba(79,199,242,.4)', 'stroke-width': 2 });
  // TR dot column
  for (let r = 0; r < 7; r++) for (let c = 0; c < 3; c++)
    put('dotcolTR', 'rect', { x: 1352 + c * 12, y: 34 + r * 12, width: 5, height: 5,
      fill: (r + c) % 3 ? 'rgba(79,199,242,.25)' : 'rgba(79,199,242,.8)' });
  // TR vertical bars
  [26, 44, 18, 52, 34, 40].forEach((h, i) => put('vbarsTR', 'rect',
    { x: 1416 + i * 14, y: 96 - h, width: 8, height: h, fill: 'rgba(79,199,242,.5)' }));
  // compass ticks
  for (let i = 0; i < 36; i++) {
    const a = i / 36 * 2 * Math.PI;
    const [x1, y1] = P(1420, 352, i % 9 === 0 ? 44 : 50, a);
    const [x2, y2] = P(1420, 352, 56, a);
    put('compassticks', 'line', { x1, y1, x2, y2, stroke: '#4FC7F2',
      'stroke-width': 1, opacity: i % 9 === 0 ? .9 : .4 });
  }
  // gear ring segments (right of compass) — bold, like the reference icon
  for (let i = 0; i < 10; i++) {
    const a0 = i / 10 * 360, a1 = a0 + 26;
    const [x0, y0] = P(1532, 420, 28, a0 * Math.PI / 180);
    const [x1, y1] = P(1532, 420, 28, a1 * Math.PI / 180);
    put('gearring', 'path', { d: `M ${x0} ${y0} A 28 28 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 2 ? '#5BD0F8' : 'rgba(79,199,242,.4)', 'stroke-width': 9 });
  }
  // bottom-right loader segments
  for (let i = 0; i < 8; i++) {
    const a0 = i / 8 * 360 + 4, a1 = a0 + 30;
    const [x0, y0] = P(1382, 838, 40, a0 * Math.PI / 180);
    const [x1, y1] = P(1382, 838, 40, a1 * Math.PI / 180);
    put('loaderseg', 'path', { d: `M ${x0} ${y0} A 40 40 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i < 5 ? '#4FC7F2' : 'rgba(79,199,242,.25)', 'stroke-width': 7 });
  }
  // bottom segment strip + pagination dots
  for (let i = 0; i < 22; i++)
    put('segstrip', 'rect', { x: 590 + i * 20, y: 930, width: 12, height: 8,
      fill: i < 14 ? 'rgba(79,199,242,.65)' : 'rgba(79,199,242,.18)' });
  for (let i = 0; i < 7; i++)
    put('pagedots', 'circle', { cx: 744 + i * 18, cy: 962, r: i === 2 ? 5 : 3.5,
      fill: i === 2 ? '#BFEFFF' : 'rgba(79,199,242,.45)' });
</script>
