/* ============================================================
   CLARVIS HUD — pixel-faithful recreation of the reference art.
   Visuals only (stage 1); functionality returns in stage 2.
   Scene coordinates: 1600 x 1000 (image scaled ~2.56x, 2.60x).
   ============================================================ */
html, body { height: 100%; margin: 0; background: #03102C; overflow: hidden; }
#scene { width: 100vw; height: 100vh; height: 100dvh; display: block; }

.spin-slow   { transform-origin: 823px 462px; animation: rot 150s linear infinite; }
.spin-blades { transform-origin: 823px 462px; animation: rot 100s linear infinite reverse; }
.spin-mid    { transform-origin: 823px 462px; animation: rot 64s linear infinite; }
.spin-inner  { transform-origin: 823px 462px; animation: rot 40s linear infinite reverse; }
@keyframes rot { to { transform: rotate(360deg); } }
.core-pulse { transform-origin: 823px 462px; animation: pulse 3.4s ease-in-out infinite; }
@keyframes pulse { 50% { transform: scale(1.05); opacity: .94; } }
.sweep1 { transform-origin: 754px 109px; animation: rot 5s linear infinite; }
.sweep2 { transform-origin: 695px 190px; animation: rot 8s linear infinite reverse; }
.ecg-sweep { stroke-dasharray: 70 620; animation: ecg 3.4s linear infinite; }
@keyframes ecg { from { stroke-dashoffset: 690; } to { stroke-dashoffset: 0; } }
.chev { animation: chevflow 1.6s linear infinite; }
.chev:nth-child(2) { animation-delay: .18s; } .chev:nth-child(3) { animation-delay: .36s; }
.chev:nth-child(4) { animation-delay: .54s; } .chev:nth-child(5) { animation-delay: .72s; }
@keyframes chevflow { 0%, 100% { opacity: .3; } 30% { opacity: 1; } }
.blink-soft { animation: bl 3s ease-in-out infinite; }
@keyframes bl { 50% { opacity: .4; } }
.loader-spin { transform-origin: 1143px 878px; animation: rot 6s linear infinite; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>

<script>
  const NS = 'http://www.w3.org/2000/svg';
  const put = (parent, tag, attrs) => {
    const el = document.createElementNS(NS, tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    document.getElementById(parent).appendChild(el);
    return el;
  };
  const P = (cx, cy, r, a) => [cx + r * Math.sin(a), cy - r * Math.cos(a)];

  // ---- center reticle: outer ticks (78) ----
  for (let i = 0; i < 78; i++) {
    const a = i / 78 * 2 * Math.PI;
    const [x1, y1] = P(823, 462, i % 6 === 0 ? 244 : 252, a);
    const [x2, y2] = P(823, 462, 262, a);
    put('oticks', 'line', { x1, y1, x2, y2, stroke: '#3FBBEF',
      'stroke-width': i % 6 === 0 ? 2 : 1, opacity: i % 6 === 0 ? .85 : .4 });
  }
  // ---- petals: irregular shards (two sizes, jittered angles, like the art) ----
  const jit = [0, 4, -4, 3, 5, -3, 4, -5, 2, -4, 5, -2];
  for (let i = 0; i < 12; i++) {
    const big = i % 3 !== 2;
    const r0 = big ? 226 : 208, r1 = big ? 168 : 176, w0 = big ? 30 : 22, w1 = big ? 20 : 15;
    const a = i * 30 + jit[i];
    put('blades', 'path', {
      d: `M ${-w0} ${-r0} L ${w0} ${-r0} L ${w1} ${-r1} L ${-w1} ${-r1} Z`,
      fill: 'rgba(120,210,250,0.13)', stroke: '#5FCBF6', 'stroke-width': 1.2,
      transform: `rotate(${a} 823 462) translate(823 462)` });
  }
  // ---- TL donuts 40/50/70 ----
  [[51, 190, 40], [125, 183, 50], [199, 176, 70]].forEach(([cx, cy, pct]) => {
    const C = 2 * Math.PI * 27;
    put('donuts', 'circle', { cx, cy, r: 27, fill: 'none',
      stroke: 'rgba(63,187,239,.25)', 'stroke-width': 7 });
    put('donuts', 'circle', { cx, cy, r: 27, fill: 'none', stroke: '#3FBBEF',
      'stroke-width': 7, 'stroke-linecap': 'round',
      'stroke-dasharray': `${C * pct / 100} ${C}`, transform: `rotate(-90 ${cx} ${cy})` });
    const t = put('donuts', 'text', { x: cx - 15, y: cy + 4, 'font-size': 12, fill: '#CFF2FF' });
    t.textContent = pct + '%';
  });
  put('donuts', 'path', { d: 'M 78 187 L 98 184 M 152 180 L 172 178',
    stroke: 'rgba(63,187,239,.45)', 'stroke-width': 1 });
  // ---- TL dot matrix 13 x 5 ----
  for (let r = 0; r < 5; r++) for (let c = 0; c < 13; c++)
    put('dotmatrixTL', 'rect', { x: 38 + c * 15, y: 258 + r * 15, width: 7, height: 7,
      fill: (r * 13 + c) % 6 < 4 ? 'rgba(63,187,239,.8)' : 'rgba(63,187,239,.2)' });
  // ---- left edge dots + film strip ----
  for (let r = 0; r < 9; r++) for (let c = 0; c < 2; c++)
    put('edgeDotsL', 'rect', { x: 46 + c * 11, y: 250 + r * 12, width: 5, height: 5,
      fill: (r + c) % 3 ? 'rgba(63,187,239,.25)' : 'rgba(63,187,239,.8)',
      transform: 'translate(-40 430)' });
  for (let i = 0; i < 8; i++)
    put('filmstrip', 'rect', { x: 20, y: 806 + i * 20, width: 8, height: 12,
      fill: 'rgba(63,187,239,.4)' });
  // ---- sail: fin triangle + vertical hatches ----
  put('sail', 'path', { d: 'M 74 594 L 176 452 L 176 594 Z', fill: 'rgba(63,187,239,.16)',
    stroke: '#3FBBEF', 'stroke-width': 1.5 });
  for (let i = 1; i < 8; i++) {
    const x = 176 - i * 13;
    const yTop = 452 + (594 - 452) * (i * 13) / (176 - 74);
    put('sail', 'line', { x1: x, y1: 594, x2: x, y2: yTop,
      stroke: 'rgba(63,187,239,.5)', 'stroke-width': 1 });
  }
  // ---- schematic ruler ----
  for (let i = 0; i < 14; i++)
    put('schemticks', 'line', { x1: 396 + i * 14, y1: 764, x2: 396 + i * 14, y2: 771,
      stroke: 'rgba(63,187,239,.5)', 'stroke-width': 1 });
  // ---- BL: dash matrix (3 rows), wide segmented bar, mini bar chart ----
  for (let r = 0; r < 3; r++) for (let c = 0; c < 16; c++)
    put('dashmatrix', 'rect', { x: 192 + c * 17, y: 786 + r * 14, width: 10, height: 6,
      fill: (r * 16 + c) % 5 < 3 ? 'rgba(63,187,239,.55)' : 'rgba(63,187,239,.15)' });
  for (let i = 0; i < 16; i++)
    put('widebar', 'rect', { x: 182 + i * 21, y: 848, width: 14, height: 12,
      fill: i < 10 ? 'rgba(63,187,239,.7)' : 'rgba(63,187,239,.18)' });
  put('widebar', 'rect', { x: 180, y: 844, width: 340, height: 20, fill: 'none',
    stroke: 'rgba(63,187,239,.45)', 'stroke-width': 1 });
  const bh = [10, 20, 14, 30, 18, 26, 34, 24, 40, 30];
  bh.forEach((h, i) => put('minibars', 'rect',
    { x: 540 + i * 17, y: 960 - h, width: 10, height: h, fill: 'rgba(63,187,239,.6)' }));
  // ---- banner hatch groups (split by the radar scope) ----
  for (let i = 0; i < 20; i++)
    put('hatchA', 'line', { x1: 470 + i * 12, y1: 88, x2: 462 + i * 12, y2: 130,
      stroke: i % 5 === 0 ? '#7FDCFB' : 'rgba(63,187,239,.45)', 'stroke-width': 2 });
  for (let i = 0; i < 16; i++)
    put('hatchB', 'line', { x1: 816 + i * 12, y1: 88, x2: 808 + i * 12, y2: 130,
      stroke: i % 5 === 0 ? '#7FDCFB' : 'rgba(63,187,239,.45)', 'stroke-width': 2 });
  // ---- TR: diagonal stripes in the parallelogram ----
  for (let i = 0; i < 9; i++)
    put('stripes', 'line', { x1: 1282 + i * 16, y1: 84, x2: 1266 + i * 16, y2: 128,
      stroke: i % 2 ? '#5FCBF6' : 'rgba(63,187,239,.35)', 'stroke-width': 5 });
  // ---- TR dot bracket ----
  for (let r = 0; r < 6; r++) for (let c = 0; c < 3; c++)
    put('dotcolTR', 'rect', { x: 1120 + c * 12, y: 130 + r * 12, width: 5, height: 5,
      fill: (r + c) % 3 ? 'rgba(63,187,239,.25)' : 'rgba(63,187,239,.8)' });
  // ---- compass ticks ----
  for (let i = 0; i < 36; i++) {
    const a = i / 36 * 2 * Math.PI;
    const [x1, y1] = P(1214, 369, i % 9 === 0 ? 40 : 45, a);
    const [x2, y2] = P(1214, 369, 51, a);
    put('compassticks', 'line', { x1, y1, x2, y2, stroke: '#3FBBEF',
      'stroke-width': 1, opacity: i % 9 === 0 ? .9 : .4 });
  }
  // ---- gear ring ----
  for (let i = 0; i < 10; i++) {
    const a0 = i / 10 * 360, a1 = a0 + 26;
    const [x0, y0] = P(1362, 377, 34, a0 * Math.PI / 180);
    const [x1, y1] = P(1362, 377, 34, a1 * Math.PI / 180);
    put('gearring', 'path', { d: `M ${x0} ${y0} A 34 34 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 2 ? '#5FCBF6' : 'rgba(63,187,239,.4)', 'stroke-width': 10 });
  }
  // ---- right edge dot stack ----
  for (let r = 0; r < 5; r++)
    put('edgeDotsR', 'rect', { x: 1494, y: 580 + r * 12, width: 6, height: 6,
      fill: r % 2 ? 'rgba(63,187,239,.3)' : 'rgba(63,187,239,.8)' });
  // ---- protractor arc ticks ----
  for (let i = 0; i <= 24; i++) {
    const a = (-58 + i * 4.8) * Math.PI / 180;
    const [x1, y1] = P(880, 970, i % 4 === 0 ? 138 : 148, a);
    const [x2, y2] = P(880, 970, 160, a);
    put('arcticks', 'line', { x1, y1, x2, y2, stroke: '#3FBBEF',
      'stroke-width': i % 4 === 0 ? 2 : 1, opacity: i % 4 === 0 ? .85 : .45 });
  }
  // ---- BR loader segments ----
  for (let i = 0; i < 12; i++) {
    const a0 = i / 12 * 360 + 3, a1 = a0 + 24;
    const [x0, y0] = P(1143, 878, 52, a0 * Math.PI / 180);
    const [x1, y1] = P(1143, 878, 52, a1 * Math.PI / 180);
    put('loaderseg', 'path', { d: `M ${x0} ${y0} A 52 52 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 3 === 2 ? 'rgba(63,187,239,.3)' : '#3FBBEF', 'stroke-width': 8 });
  }
  // ---- ruler above capsule ----
  for (let i = 0; i < 16; i++)
    put('ruler', 'line', { x1: 1252 + i * 14, y1: 856, x2: 1252 + i * 14,
      y2: i % 4 === 0 ? 868 : 864, stroke: 'rgba(63,187,239,.55)', 'stroke-width': 1 });
  // ---- bottom segment strip + pagination dots ----
  for (let i = 0; i < 20; i++)
    put('segstrip', 'rect', { x: 560 + i * 20, y: 934, width: 12, height: 8,
      fill: i < 13 ? 'rgba(63,187,239,.65)' : 'rgba(63,187,239,.18)' });
  for (let i = 0; i < 7; i++)
    put('pagedots', 'circle', { cx: 716 + i * 18, cy: 960, r: i === 2 ? 5 : 3.5,
      fill: i === 2 ? '#CFF2FF' : 'rgba(63,187,239,.45)' });
</script>
