<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CLARVIS</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="theme-color" content="#030B18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CLARVIS">
<style>
/* ============================================================
   CLARVIS HUD SHELL — the front door.
   Palette: deep void blue + interface cyan (reference: classic
   sci-fi HUD concept). The center reticle is CLARVIS itself —
   its rings react to listening / thinking / speaking.
   ============================================================ */
:root {
  --void: #030B18;
  --ink: rgba(6, 20, 42, 0.72);
  --ink-solid: #061430;
  --line: #0E3A66;
  --line-dim: #0A2547;
  --cyan: #35C7F0;
  --flare: #7FE3FF;
  --text: #D8F2FF;
  --dim: #5E86A8;
  --good: #52E0A0;
  --warn: #FFB84D;
  --danger: #FF5C5C;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  --body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background:
    radial-gradient(1100px 700px at 50% 38%, rgba(35, 110, 190, 0.16), transparent 60%),
    radial-gradient(900px 600px at 85% 90%, rgba(20, 70, 140, 0.10), transparent 55%),
    var(--void);
  color: var(--text);
  font-family: var(--body);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
/* faint engineering grid over everything */
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(53, 199, 240, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(53, 199, 240, 0.035) 1px, transparent 1px);
  background-size: 44px 44px;
}
/* one-time boot scan sweep */
body::after {
  content: ""; position: fixed; left: 0; right: 0; top: -8%; height: 6%;
  background: linear-gradient(180deg, transparent, rgba(127, 227, 255, 0.10), transparent);
  z-index: 40; pointer-events: none;
  animation: bootscan 1.1s ease-out 0.15s 1 forwards;
}
@keyframes bootscan { to { top: 108%; } }

/* ---------- viewport corner brackets ---------- */
.frame { position: fixed; inset: 10px; pointer-events: none; z-index: 30; }
.frame i { position: absolute; width: 26px; height: 26px; border: 1px solid rgba(53,199,240,.55); }
.frame i:nth-child(1) { top: 0; left: 0; border-right: 0; border-bottom: 0; }
.frame i:nth-child(2) { top: 0; right: 0; border-left: 0; border-bottom: 0; }
.frame i:nth-child(3) { bottom: 0; left: 0; border-right: 0; border-top: 0; }
.frame i:nth-child(4) { bottom: 0; right: 0; border-left: 0; border-top: 0; }

/* ---------- ambient density layer ---------- */
.ruler { position: fixed; top: 16%; bottom: 20%; width: 10px; z-index: 2; pointer-events: none;
         background-image: repeating-linear-gradient(180deg, rgba(53,199,240,.45) 0 1px, transparent 1px 14px); }
.ruler.l { left: 8px; } .ruler.r { right: 8px; }
.cross { position: fixed; font-family: var(--mono); color: rgba(53,199,240,.3); font-size: 13px;
         z-index: 2; pointer-events: none; }
.xline { position: absolute; top: 50%; height: 1px; width: 14vw; max-width: 190px;
         background: linear-gradient(90deg, transparent, rgba(53,199,240,.45)); pointer-events: none; }
.xline.l { right: 99%; } .xline.r { left: 99%; transform: scaleX(-1); }
.substrip { position: relative; z-index: 5; display: flex; gap: 24px; flex-wrap: wrap;
            padding: 0 28px 8px; font-family: var(--mono); font-size: 9px;
            letter-spacing: .2em; color: rgba(94,134,168,.8); text-transform: uppercase; }
.substrip b { color: var(--cyan); font-weight: 400; }
.gauge { display: flex; align-items: center; gap: 7px; }
.gauge svg { width: 34px; height: 34px; }
.gauge .g-ring { fill: none; stroke: var(--line-dim); stroke-width: 3; }
.gauge .g-val { fill: none; stroke: var(--cyan); stroke-width: 3; stroke-linecap: round;
                transform: rotate(-90deg); transform-origin: 50% 50%;
                filter: drop-shadow(0 0 4px rgba(53,199,240,.6)); }
.t-empty { text-align: center; margin-top: 16px; font-family: var(--mono); font-size: 10px;
           letter-spacing: .32em; color: var(--dim); text-transform: uppercase;
           animation: blink 2.4s ease-in-out infinite; }

/* ---------- top strip ---------- */
.top {
  position: relative; z-index: 5;
  display: flex; align-items: center; gap: 18px;
  padding: 14px 26px 10px;
  font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
  color: var(--dim); text-transform: uppercase;
}
.top .mark { color: var(--flare); font-size: 15px; letter-spacing: .34em; text-shadow: 0 0 18px rgba(127,227,255,.55); }
.top .mark b { color: var(--cyan); font-weight: 400; }
.top .sep { flex: 0 0 1px; height: 16px; background: var(--line); }
.top .grow { flex: 1; }
.top a { color: var(--dim); text-decoration: none; letter-spacing: .18em; }
.top a:hover, .top a:focus-visible { color: var(--flare); outline: none; }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px;
       background: var(--dim); box-shadow: 0 0 8px currentColor; vertical-align: 1px; }
.dot.g { background: var(--good); color: var(--good); }
.dot.y { background: var(--warn); color: var(--warn); }
.dot.r { background: var(--danger); color: var(--danger); }

/* ---------- main grid ---------- */
.stage {
  position: relative; z-index: 5;
  display: grid;
  grid-template-columns: minmax(230px, 300px) 1fr minmax(230px, 300px);
  gap: 14px;
  padding: 4px 22px 12px;
  height: calc(100vh - 138px);
  height: calc(100dvh - 138px);
}
.col { display: flex; flex-direction: column; gap: 12px; min-height: 0; overflow: hidden; }
/* panels stretch to fill the column — the HUD reads dense, no dead bands */
.col > .panel { flex: 1 1 0; display: flex; flex-direction: column; min-height: 72px; }
.col > .panel .p-body { flex: 1; overflow-y: auto; scrollbar-width: thin;
                        scrollbar-color: var(--line) transparent; }
.col > .deco { flex: 0 0 auto; }

/* ---------- panels ---------- */
.panel {
  position: relative;
  background: var(--ink);
  border: 1px solid var(--line);
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  padding: 10px 12px 11px;
  backdrop-filter: blur(3px);
  min-height: 0;
  animation: matz .5s ease-out backwards;
}
@keyframes matz { from { opacity: 0; transform: translateY(8px); } }
.panel::before { /* corner accent */
  content: ""; position: absolute; top: 0; left: 0; width: 34px; height: 2px;
  background: var(--cyan); opacity: .8;
}
.p-head {
  display: flex; align-items: baseline; gap: 8px;
  font-family: var(--mono); font-size: 10px; letter-spacing: .22em;
  color: var(--cyan); text-transform: uppercase;
  padding-bottom: 7px; border-bottom: 1px solid var(--line-dim);
  margin-bottom: 7px;
  cursor: pointer; user-select: none;
}
.p-head:hover .p-x, .p-head:focus-visible .p-x { color: var(--flare); }
.p-head .n { color: var(--dim); }
.p-head .p-x { margin-left: auto; color: var(--dim); font-size: 11px; letter-spacing: 0; }
.p-body { font-size: 12.5px; line-height: 1.45; color: var(--text); overflow: hidden; }
.row { padding: 5px 0; border-bottom: 1px dashed rgba(14, 58, 102, .5); }
.row:last-child { border-bottom: 0; }
.r-t { color: var(--text); }
.r-m { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: .06em; margin-top: 2px; }
.pill { font-family: var(--mono); font-size: 9px; letter-spacing: .12em; color: var(--flare);
        border: 1px solid var(--line); padding: 1px 5px; margin-right: 5px; text-transform: uppercase; }
.empty { color: var(--dim); font-size: 12px; font-style: italic; }

/* ---------- decorative clusters (data-fed where cheap) ---------- */
.deco { display: flex; gap: 14px; align-items: center; padding: 2px 4px; }
.wave { display: flex; align-items: flex-end; gap: 2px; height: 22px; flex: 1; }
.wave i { flex: 1; background: linear-gradient(180deg, var(--cyan), transparent);
          opacity: .65; animation: wv 2s ease-in-out infinite; }
@keyframes wv { 50% { transform: scaleY(.35); } }
.dots { display: grid; grid-template-columns: repeat(8, 4px); gap: 3px; }
.dots i { width: 4px; height: 4px; background: var(--line); }
.dots i.on { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
.readout { font-family: var(--mono); font-size: 9px; color: var(--dim); letter-spacing: .14em; }
.readout b { color: var(--flare); font-weight: 400; }

/* ---------- center column: reticle + transcript + command ---------- */
.center { display: flex; flex-direction: column; align-items: center; min-height: 0; }
.reticle-wrap { position: relative; flex: 0 0 auto; margin-top: -6px; }
.reticle { width: min(30vh, 260px); height: min(30vh, 260px); display: block; }
.reticle .r-ticks   { transform-origin: 50% 50%; animation: spin 90s linear infinite; }
.reticle .r-arcs    { transform-origin: 50% 50%; animation: spin 55s linear infinite reverse; }
.reticle .r-dash    { transform-origin: 50% 50%; animation: spin 38s linear infinite; }
.reticle .r-core    { transform-origin: 50% 50%; }
@keyframes spin { to { transform: rotate(360deg); } }
.core-glow { filter: drop-shadow(0 0 14px rgba(53, 199, 240, .8)); }
/* reticle states — the machine's presence */
body.st-thinking .r-arcs { animation-duration: 6s; }
body.st-thinking .r-dash { animation-duration: 4s; }
body.st-listening .r-core circle:last-child { fill: rgba(127, 227, 255, .95); }
body.st-listening .reticle { filter: drop-shadow(0 0 26px rgba(127, 227, 255, .5)); }
body.st-speaking .r-core { animation: corepulse 1.1s ease-in-out infinite; }
@keyframes corepulse { 50% { transform: scale(1.12); } }
.ret-label {
  position: absolute; left: 50%; bottom: -4px; transform: translateX(-50%);
  font-family: var(--mono); font-size: 9px; letter-spacing: .3em; color: var(--dim);
  text-transform: uppercase; white-space: nowrap;
}
body.st-thinking .ret-label, body.st-listening .ret-label { color: var(--flare); }

/* ---------- transcript ---------- */
.transcript {
  flex: 1 1 auto; width: min(660px, 100%); min-height: 0;
  overflow-y: auto; padding: 10px 14px; margin-top: 6px;
  mask-image: linear-gradient(180deg, transparent, #000 24px);
  -webkit-mask-image: linear-gradient(180deg, transparent, #000 24px);
  scrollbar-width: thin; scrollbar-color: var(--line) transparent;
}
.msg { margin: 10px 0; display: flex; }
.msg.user { justify-content: flex-end; }
.bubble {
  max-width: 86%; padding: 8px 12px; font-size: 13.5px; line-height: 1.5;
  border: 1px solid var(--line);
  background: rgba(6, 20, 42, .82);
}
.msg.user .bubble {
  border-color: rgba(53, 199, 240, .45); color: var(--flare);
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
  font-family: var(--mono); font-size: 12.5px;
}
.msg.assistant .bubble {
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
}
.bubble p { margin: 0 0 8px; } .bubble p:last-child { margin: 0; }
.bubble ul { margin: 4px 0 8px 18px; }
.bubble code { font-family: var(--mono); font-size: 12px; color: var(--flare);
               background: rgba(53,199,240,.08); padding: 1px 4px; }
.bubble pre { background: #04101F; border: 1px solid var(--line-dim); padding: 8px 10px;
              overflow-x: auto; margin: 6px 0; }
.bubble pre code { background: none; padding: 0; }
.bubble a { color: var(--cyan); }
.bubble h1, .bubble h2, .bubble h3 { font-size: 14px; margin: 8px 0 4px; color: var(--flare); }
.tool-status {
  font-family: var(--mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--cyan); padding: 4px 0 2px 4px; animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: .35; } }

/* ---------- command bar ---------- */
.command {
  position: relative; z-index: 6;
  width: min(720px, calc(100vw - 40px));
  margin: 0 auto; padding: 0 0 14px;
  display: flex; gap: 8px; align-items: center;
}
.command form { flex: 1; display: flex; gap: 8px; align-items: center; }
.cmd-frame {
  flex: 1; display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--line);
  background: rgba(5, 16, 33, .88);
  clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
  padding: 2px 6px 2px 14px;
}
.cmd-frame .prompt-char { font-family: var(--mono); color: var(--cyan); font-size: 13px; }
#cmd {
  flex: 1; background: none; border: 0; outline: none;
  color: var(--text); font-family: var(--mono); font-size: 13.5px;
  padding: 11px 0; letter-spacing: .02em;
}
#cmd::placeholder { color: var(--dim); letter-spacing: .08em; }
.hud-btn {
  flex: 0 0 auto; border: 1px solid var(--line); background: rgba(53,199,240,.06);
  color: var(--cyan); font-family: var(--mono); font-size: 11px; letter-spacing: .18em;
  text-transform: uppercase; padding: 10px 16px; cursor: pointer;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}
.hud-btn:hover, .hud-btn:focus-visible { background: rgba(53,199,240,.16); color: var(--flare); outline: none; }
.hud-btn:disabled { opacity: .4; cursor: default; }
#mic {
  width: 42px; height: 42px; display: grid; place-items: center; padding: 0;
  font-size: 16px; color: var(--cyan);
}
#mic.listening { color: #04121f; background: var(--flare); animation: micpulse 1.2s ease-in-out infinite; }
@keyframes micpulse { 50% { box-shadow: 0 0 22px rgba(127,227,255,.75); } }
#mic.busy { opacity: .45; pointer-events: none; }

/* ---------- modal (expanded panel) ---------- */
.modal-veil {
  position: fixed; inset: 0; z-index: 50; display: none;
  background: rgba(2, 8, 18, .78); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; padding: 24px;
}
.modal-veil.open { display: flex; }
.modal {
  position: relative; width: min(720px, 100%); max-height: min(78vh, 640px);
  background: var(--ink-solid); border: 1px solid var(--line);
  clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
  padding: 16px 18px; display: flex; flex-direction: column;
  animation: matz .25s ease-out;
}
.modal .m-head {
  display: flex; align-items: baseline; gap: 10px;
  font-family: var(--mono); font-size: 12px; letter-spacing: .26em; color: var(--flare);
  text-transform: uppercase; padding-bottom: 10px; border-bottom: 1px solid var(--line);
  margin-bottom: 10px;
}
.modal .m-head button {
  margin-left: auto; background: none; border: 1px solid var(--line); color: var(--dim);
  font-family: var(--mono); font-size: 11px; padding: 3px 10px; cursor: pointer; letter-spacing: .1em;
}
.modal .m-head button:hover { color: var(--danger); border-color: var(--danger); }
.m-body { overflow-y: auto; min-height: 0; font-size: 13px; line-height: 1.5;
          scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
.m-body .row { padding: 8px 2px; }
.mini {
  background: transparent; border: 1px solid var(--line); color: var(--cyan);
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  padding: 4px 10px; cursor: pointer; margin: 4px 6px 0 0;
}
.mini:hover { background: rgba(53,199,240,.14); color: var(--flare); }
.mini.no:hover { background: rgba(255,92,92,.12); color: var(--danger); border-color: var(--danger); }

/* ---------- mobile ---------- */
@media (max-width: 900px) {
  body { overflow: auto; }
  .stage { grid-template-columns: 1fr; height: auto; padding-bottom: 86px; }
  .center { order: -1; }
  .reticle { width: 150px; height: 150px; }
  .transcript { max-height: 44vh; }
  .command { position: fixed; left: 0; right: 0; bottom: 0; padding: 10px 12px
             calc(10px + env(safe-area-inset-bottom)); background: rgba(3, 11, 24, .92);
             border-top: 1px solid var(--line-dim); width: 100%; }
  .top { flex-wrap: wrap; gap: 10px; padding: 12px 14px 8px; }
  .top .hide-m { display: none; }
  .frame, .ruler, .cross { display: none; }
  .substrip { gap: 12px; padding: 0 16px 6px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>
<body class="st-idle">

<div class="frame" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
<div class="ruler l" aria-hidden="true"></div>
<div class="ruler r" aria-hidden="true"></div>
<span class="cross" style="top:20%; left:23%" aria-hidden="true">+</span>
<span class="cross" style="top:64%; left:26%" aria-hidden="true">+</span>
<span class="cross" style="top:30%; right:24%" aria-hidden="true">+</span>
<span class="cross" style="top:70%; right:22%" aria-hidden="true">+</span>
<span class="cross" style="top:84%; left:48%" aria-hidden="true">+</span>

<header class="top">
  <span class="mark">CLAR<b>VIS</b></span>
  <span class="sep"></span>
  <span id="clock">--:--:--</span>
  <span class="sep hide-m"></span>
  <span class="hide-m"><span class="dot" id="health-dot"></span><span id="health-txt">SYS</span></span>
  <span class="grow"></span>
  <span class="readout hide-m" id="cost-ro">API <b>$0.00</b></span>
  <span class="sep hide-m"></span>
  <a href="/memory">Memory</a>
  <a href="/dashboard">Board</a>
  <a href="/chat-classic">Console</a>
</header>
<div class="substrip" aria-hidden="false">
  <span>NODE <b id="node-ro">—</b></span>
  <span>VAULT <b id="vault-ro">—</b></span>
  <span>SCOUT <b>DAILY 06:00</b></span>
  <span class="gauge"><svg viewBox="0 0 36 36"><circle class="g-ring" cx="18" cy="18" r="15"/><circle class="g-val" id="g-tasks" cx="18" cy="18" r="15" stroke-dasharray="0 95"/></svg><span>TASKS <b id="g-tasks-t">0%</b></span></span>
  <span class="gauge"><svg viewBox="0 0 36 36"><circle class="g-ring" cx="18" cy="18" r="15"/><circle class="g-val" id="g-intake" cx="18" cy="18" r="15" stroke-dasharray="0 95"/></svg><span>TRIAGE <b id="g-intake-t">0%</b></span></span>
</div>

<main class="stage">
  <!-- LEFT -->
  <section class="col">
    <div class="panel" style="animation-delay:.05s">
      <div class="p-head" data-modal="tasks" role="button" tabindex="0">Tasks <span class="n" id="tasks-n"></span><span class="p-x">⤢</span></div>
      <div class="p-body" id="tasks-body"><div class="empty">Standing by.</div></div>
    </div>
    <div class="panel" style="animation-delay:.12s">
      <div class="p-head" data-modal="today" role="button" tabindex="0">Today <span class="n" id="today-n"></span><span class="p-x">⤢</span></div>
      <div class="p-body" id="today-body"><div class="empty">No events found.</div></div>
    </div>
    <div class="panel" style="animation-delay:.19s">
      <div class="p-head" data-modal="system" role="button" tabindex="0">System <span class="p-x">⤢</span></div>
      <div class="p-body" id="system-body"><div class="empty">Reading state…</div></div>
    </div>
    <div class="deco" aria-hidden="true">
      <div class="wave" id="wave"></div>
      <span class="readout" id="uptime-ro">SYNC <b>—</b></span>
    </div>
  </section>

  <!-- CENTER -->
  <section class="center">
    <div class="reticle-wrap">
      <svg class="reticle" viewBox="0 0 200 200" aria-hidden="true">
        <g class="r-ticks" stroke="#35C7F0" stroke-width="1" opacity="0.55">
          <circle cx="100" cy="100" r="92" fill="none" stroke-opacity="0.35"/>
          <g id="tickring"></g>
        </g>
        <g class="r-arcs" stroke="#7FE3FF" stroke-width="2.5" fill="none" stroke-linecap="round">
          <path d="M 100 24 A 76 76 0 0 1 165 62" opacity="0.9"/>
          <path d="M 173 122 A 76 76 0 0 1 128 170" opacity="0.55"/>
          <path d="M 62 166 A 76 76 0 0 1 27 112" opacity="0.75"/>
        </g>
        <g class="r-dash" stroke="#35C7F0" stroke-width="1" fill="none">
          <circle cx="100" cy="100" r="58" stroke-dasharray="4 7" opacity="0.7"/>
          <circle cx="100" cy="100" r="46" stroke-dasharray="1 5" opacity="0.4"/>
        </g>
        <g class="r-core core-glow">
          <circle cx="100" cy="100" r="20" fill="none" stroke="#35C7F0" stroke-width="1" opacity="0.8"/>
          <circle cx="100" cy="100" r="9" fill="rgba(53,199,240,0.85)"/>
        </g>
      </svg>
      <span class="ret-label" id="ret-label">ONLINE</span>
      <i class="xline l" aria-hidden="true"></i>
      <i class="xline r" aria-hidden="true"></i>
    </div>

    <div class="transcript" id="transcript" aria-live="polite"></div>

    <div class="command">
      <form id="cmd-form" autocomplete="off">
        <div class="cmd-frame">
          <span class="prompt-char">»</span>
          <input id="cmd" placeholder="COMMAND OR QUESTION" aria-label="Message CLARVIS">
        </div>
        <button class="hud-btn" id="mic" type="button" title="Hold to talk — or tap to toggle">◉</button>
        <button class="hud-btn" type="submit">Send</button>
      </form>
    </div>
  </section>

  <!-- RIGHT -->
  <section class="col">
    <div class="panel" style="animation-delay:.08s">
      <div class="p-head" data-modal="intake" role="button" tabindex="0">Intake <span class="n" id="intake-n"></span><span class="p-x">⤢</span></div>
      <div class="p-body" id="intake-body"><div class="empty">Nothing waiting.</div></div>
    </div>
    <div class="panel" style="animation-delay:.15s">
      <div class="p-head" data-modal="approvals" role="button" tabindex="0">Approvals <span class="n" id="appr-n"></span><span class="p-x">⤢</span></div>
      <div class="p-body" id="appr-body"><div class="empty">No pending actions.</div></div>
    </div>
    <div class="panel" style="animation-delay:.22s">
      <div class="p-head" data-modal="ops" role="button" tabindex="0">Operations <span class="p-x">⤢</span></div>
      <div class="p-body" id="ops-body"><div class="empty">Quiet.</div></div>
    </div>
    <div class="deco" aria-hidden="true">
      <span class="readout" id="intake-ro">IN <b>0</b></span>
      <div class="dots" id="dots"></div>
      <span class="readout" id="jobs-ro">JOBS <b>0</b></span>
    </div>
  </section>
</main>

<div class="modal-veil" id="veil" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="m-head"><span id="m-title">PANEL</span>
      <button id="m-close" aria-label="Close">ESC</button></div>
    <div class="m-body" id="m-body"></div>
  </div>
</div>

<script>
  // ============ utilities ============
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // tick ring: 60 radial ticks, every 5th long — drawn, not hand-written
  (function ticks() {
    const g = $('tickring'); let out = '';
    for (let i = 0; i < 60; i++) {
      const a = (i / 60) * 2 * Math.PI;
      const r1 = i % 5 === 0 ? 84 : 88, r2 = 92;
      out += `<line x1="${100 + r1 * Math.sin(a)}" y1="${100 - r1 * Math.cos(a)}"
                    x2="${100 + r2 * Math.sin(a)}" y2="${100 - r2 * Math.cos(a)}"/>`;
    }
    g.innerHTML = out;
  })();

  (function dots() {
    let out = '';
    for (let i = 0; i < 24; i++) out += '<i></i>';
    $('dots').innerHTML = out;
  })();

  function tickClock() {
    const d = new Date();
    $('clock').textContent = d.toLocaleTimeString('en-US', { hour12: false }) + ' · ' +
      d.toLocaleDateString('en-US', { month: 'short', day: '2-digit' }).toUpperCase();
  }
  tickClock(); setInterval(tickClock, 1000);

  function setState(st) {  // idle | listening | thinking | speaking
    document.body.className = 'st-' + st;
    $('ret-label').textContent = { idle: 'ONLINE', listening: 'LISTENING',
                                   thinking: 'PROCESSING', speaking: 'SPEAKING' }[st] || 'ONLINE';
  }

  // ============ markdown (ported from console) ============
  function renderMarkdown(text) {
    let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const blocks = [];
    s = s.replace(/```(?:\w*)\n?([\s\S]*?)```/g, (_, code) => {
      blocks.push(`<pre><code>${code}</code></pre>`);
      return `\x00B${blocks.length - 1}\x00`;
    });
    s = s
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    const lines = s.split('\n'); const out = []; let inList = false, para = [];
    const flush = () => { if (para.length) { out.push(`<p>${para.join('<br>')}</p>`); para = []; } };
    for (const line of lines) {
      const li = line.match(/^\s*[-*] (.+)$/);
      const isBlock = /^(<h\d|\x00B)/.test(line.trim());
      if (li) { flush(); if (!inList) { out.push('<ul>'); inList = true; } out.push(`<li>${li[1]}</li>`); }
      else { if (inList) { out.push('</ul>'); inList = false; }
        if (isBlock) { flush(); out.push(line.trim()); }
        else if (line.trim() === '') flush(); else para.push(line); }
    }
    flush(); if (inList) out.push('</ul>');
    return out.join('').replace(/\x00B(\d+)\x00/g, (_, i) => blocks[+i]);
  }

  // ============ transcript + chat engine ============
  const transcript = $('transcript');
  const cmdForm = $('cmd-form');
  const cmd = $('cmd');
  let sending = false;

  function addMessage(role, text) {
    const te = transcript.querySelector('.t-empty');
    if (te) te.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'assistant') bubble.innerHTML = renderMarkdown(text);
    else bubble.textContent = text;
    wrap.appendChild(bubble);
    transcript.appendChild(wrap);
    transcript.scrollTop = transcript.scrollHeight;
    return bubble;
  }
  function showToolStatus(label) {
    removeToolStatus();
    const el = document.createElement('div');
    el.className = 'tool-status'; el.id = 'tool-status'; el.textContent = label;
    transcript.appendChild(el); transcript.scrollTop = transcript.scrollHeight;
  }
  function removeToolStatus() { const el = $('tool-status'); if (el) el.remove(); }

  async function loadHistory() {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      const msgs = (data.messages || []).slice(-12);
      msgs.forEach(m => addMessage(m.role, m.content));
      if (!msgs.length) transcript.innerHTML =
        '<div class="t-empty">AWAITING INPUT — SPEAK OR TYPE BELOW</div>';
    } catch (e) {
      if (!transcript.childElementCount) transcript.innerHTML =
        '<div class="t-empty">AWAITING INPUT — SPEAK OR TYPE BELOW</div>';
    }
  }

  cmdForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = cmd.value.trim();
    if (!message || sending) return;
    sending = true;
    cmd.value = '';
    addMessage('user', message);
    setState('thinking');
    let bubble = null, fullText = '';
    function handleEvent(ev) {
      if (ev.type === 'text') {
        removeToolStatus();
        if (!bubble) bubble = addMessage('assistant', '');
        fullText += ev.delta;
        bubble.innerHTML = renderMarkdown(fullText);
        transcript.scrollTop = transcript.scrollHeight;
      } else if (ev.type === 'replace' || ev.type === 'final') {
        removeToolStatus();
        if (typeof ev.text === 'string') {
          if (!bubble) bubble = addMessage('assistant', '');
          fullText = ev.text;
          bubble.innerHTML = renderMarkdown(fullText);
          transcript.scrollTop = transcript.scrollHeight;
        }
      } else if (ev.type === 'status') {
        showToolStatus(ev.label);
      } else if (ev.type === 'error') {
        removeToolStatus();
        addMessage('assistant', `Something went wrong: ${ev.message}`);
      }
    }
    try {
      const res = await fetch('/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      if (!res.ok) {
        if (res.status === 401) { location.href = '/login'; return; }
        addMessage('assistant', `The server returned an error (${res.status}). Your message is back in the box — send to retry.`);
        cmd.value = message;
        return;
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) { try { handleEvent(JSON.parse(line)); } catch (e) {} }
        }
      }
      removeToolStatus();
      if ((voiceOn || lastVoiceTurn) && fullText) { setState('speaking'); await speak(fullText); }
      lastVoiceTurn = false;
      loadData();   // a turn often changes tasks/intake — refresh panels
    } catch (err) {
      addMessage('assistant', 'Connection lost mid-reply. Try again.');
    } finally {
      sending = false;
      setState('idle');
      cmd.focus();
    }
  });

  // ============ voice (ported: WebAudio unlock + hold-to-talk + Scribe) ============
  let audioCtx = null, currentVoiceSrc = null, lastVoiceTurn = false;
  const canSpeak = 'speechSynthesis' in window;
  let voiceOn = localStorage.getItem('jarvis-voice') === 'on';
  function ensureAudioCtx() {
    if (!audioCtx && (window.AudioContext || window.webkitAudioContext))
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  document.addEventListener('pointerdown', ensureAudioCtx, { capture: true });
  function stopVoicePlayback() {
    if (currentVoiceSrc) { try { currentVoiceSrc.stop(); } catch (e) {} currentVoiceSrc = null; }
    if (canSpeak) speechSynthesis.cancel();
    if (document.body.className === 'st-speaking') setState('idle');
  }
  async function playVoice(arrayBuffer) {
    ensureAudioCtx();
    if (!audioCtx) throw new Error('no ctx');
    const buf = await audioCtx.decodeAudioData(arrayBuffer);
    if (currentVoiceSrc) { try { currentVoiceSrc.stop(); } catch (e) {} }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination);
    src.onended = () => { if (document.body.className === 'st-speaking') setState('idle'); };
    src.start(); currentVoiceSrc = src;
  }
  function speechText(md) {
    return md.replace(/```[\s\S]*?```/g, ' (code shown on screen) ')
      .replace(/`([^`\n]+)`/g, '$1').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1')
      .replace(/^#{1,3} /gm, '').replace(/\*\*?|__?/g, '').replace(/^\s*[-*] /gm, '').trim();
  }
  function browserSpeak(text) {
    if (!canSpeak) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.05;
    const v = speechSynthesis.getVoices().find(v => v.lang.startsWith('en') && v.localService)
      || speechSynthesis.getVoices().find(v => v.lang.startsWith('en'));
    if (v) u.voice = v;
    u.onend = () => setState('idle');
    speechSynthesis.speak(u);
  }
  async function speak(md) {
    const text = speechText(md);
    if (!text) return;
    try {
      const res = await fetch('/api/speak', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const ctype = res.headers.get('Content-Type') || '';
      if (ctype.includes('audio')) { await playVoice(await res.arrayBuffer()); return; }
      const data = await res.json().catch(() => ({}));
      if (data.ok) { setState('idle'); return; }
    } catch (err) {}
    browserSpeak(text);
  }

  const micBtn = $('mic');
  const canRecord = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
  let recording = false, mediaRecorder = null, chunks = [], micStream = null;
  async function transcribeBlob(blob) {
    const ext = (blob.type || '').includes('mp4') ? 'mp4' : (blob.type || '').includes('ogg') ? 'ogg' : 'webm';
    const fd = new FormData();
    fd.append('audio', blob, 'clip.' + ext);
    micBtn.classList.add('busy');
    cmd.placeholder = 'TRANSCRIBING…';
    try {
      const res = await fetch('/api/transcribe', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.text) {
        cmd.value = (cmd.value ? cmd.value + ' ' : '') + data.text;
        lastVoiceTurn = true;
        if (localStorage.getItem('jarvis-voice-autosend') !== 'off') cmdForm.requestSubmit();
      } else {
        cmd.placeholder = 'DIDN\'T CATCH THAT — TRY AGAIN';
      }
    } catch (err) {
      cmd.placeholder = 'TRANSCRIPTION FAILED — TYPE INSTEAD';
    } finally {
      micBtn.classList.remove('busy');
      setTimeout(() => { cmd.placeholder = 'COMMAND OR QUESTION'; }, 2500);
    }
  }
  async function startRecording() {
    try { micStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch (err) { cmd.placeholder = 'MIC PERMISSION NEEDED'; return; }
    chunks = [];
    mediaRecorder = new MediaRecorder(micStream);
    mediaRecorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      const mime = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
      if (chunks.length) transcribeBlob(new Blob(chunks, { type: mime }));
    };
    mediaRecorder.start();
    recording = true; micBtn.classList.add('listening'); setState('listening');
  }
  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    recording = false; micBtn.classList.remove('listening'); setState('idle');
  }
  if (!canRecord) micBtn.style.display = 'none';
  else {
    let pressT = 0, held = false;
    const HOLD_MS = 350;
    micBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      pressT = Date.now(); held = false;
      if (!recording) { stopVoicePlayback(); startRecording(); held = true; }
    });
    micBtn.addEventListener('pointerup', (e) => {
      e.preventDefault();
      const dur = Date.now() - pressT;
      if (held && dur >= HOLD_MS) stopRecording();
      else if (!held && recording) stopRecording();
    });
    micBtn.addEventListener('pointerleave', () => {
      if (held && recording && Date.now() - pressT >= HOLD_MS) stopRecording();
    });
    micBtn.addEventListener('contextmenu', (e) => e.preventDefault());
  }

  // ============ data panels ============
  let D = {};   // merged /api/home + /api/dashboard payloads

  function rows(list, fn, emptyMsg) {
    if (!list || !list.length) return `<div class="empty">${emptyMsg}</div>`;
    return list.map(fn).join('');
  }

  function renderPanels() {
    const tasks = (D.tasks || []).filter(t => !['done', 'dropped'].includes(t.status));
    $('tasks-n').textContent = tasks.length ? `// ${tasks.length}` : '';
    $('tasks-body').innerHTML = rows(tasks.slice(0, 4), t => `
      <div class="row"><div class="r-t">${esc(t.title)}</div>
      <div class="r-m">${esc(t.status)}${t.urgency ? ' · U' + t.urgency : ''}</div></div>`, 'No active tasks.');

    const ev = D.today_events || [];
    $('today-n').textContent = ev.length ? `// ${ev.length}` : '';
    $('today-body').innerHTML = rows(ev.slice(0, 4), e => `
      <div class="row"><div class="r-t">${esc(e.summary || e.title || '(untitled)')}</div>
      <div class="r-m">${esc(e.start || e.when || '')}</div></div>`, 'Clear calendar.');

    const h = D.health || {};
    const overall = (h.overall || 'unknown').toLowerCase();
    const dot = overall === 'ok' || overall === 'green' ? 'g' : overall === 'degraded' || overall === 'yellow' ? 'y' : overall === 'unknown' ? '' : 'r';
    $('health-dot').className = 'dot ' + dot;
    $('health-txt').textContent = ('SYS ' + overall).toUpperCase();
    const mon = D.monitor || {};
    const incidents = (mon.incidents || []).length;
    const jobs = (D.jobs && D.jobs.counts) || {};
    $('system-body').innerHTML = `
      <div class="row"><div class="r-t">Health: ${esc(overall)}</div>
        <div class="r-m">${incidents} incident(s) in window</div></div>
      <div class="row"><div class="r-t">Jobs: ${jobs.running || 0} running · ${jobs.queued || 0} queued</div>
        <div class="r-m">${esc((D.cost && D.cost.month_usd != null) ? ('API this month $' + D.cost.month_usd) : '')}</div></div>`;
    if (D.cost && D.cost.month_usd != null) $('cost-ro').innerHTML = `API <b>$${esc(D.cost.month_usd)}</b>`;
    $('jobs-ro').innerHTML = `JOBS <b>${(jobs.running || 0) + (jobs.queued || 0)}</b>`;

    const ik = D.intake || { counts: {}, recent: [] };
    const waiting = (ik.recent || []).filter(r => r.status === 'new');
    $('intake-n').textContent = waiting.length ? `// ${waiting.length}` : '';
    $('intake-ro').innerHTML = `IN <b>${waiting.length}</b>`;
    const srcIcon = { imessage: '💬', gmail: '✉️', calendar: '📅', inbox: '📥' };
    $('intake-body').innerHTML = rows(waiting.slice(0, 3), r => `
      <div class="row"><div class="r-t">${srcIcon[r.source] || '•'} ${esc(r.sender || r.source)}</div>
      <div class="r-m">${esc((r.items || []).map(i => i.text).join(' · ').slice(0, 90))}</div></div>`, 'Nothing waiting.');

    const pend = D.pending_actions || [];
    $('appr-n').textContent = pend.length ? `// ${pend.length}` : '';
    $('appr-body').innerHTML = rows(pend.slice(0, 3), a => `
      <div class="row"><div class="r-t">${esc(a.summary || a.action || 'action')}</div>
      <div class="r-m">#${a.id}</div></div>`, 'No pending actions.');

    const money = (D.money && D.money.counts) || {};
    const exp = (D.expansion && D.expansion.counts) || {};
    $('ops-body').innerHTML = `
      <div class="row"><div class="r-t">Money: ${money.pursue || 0} pursue · ${money.found || 0} found</div>
        <div class="r-m">scouts + council + planner</div></div>
      <div class="row"><div class="r-t">Expansion: ${exp.approved || 0} approved · ${exp.found || 0} found</div>
        <div class="r-m">daily scout ${D.scout_on === false ? 'off' : 'on'}</div></div>`;

    // honest decorations: waveform from recent activity, dots from tool usage
    const act = (D.activity || []).length;
    const wave = $('wave');
    if (!wave.childElementCount) {
      let bars = '';
      for (let i = 0; i < 26; i++)
        bars += `<i style="animation-delay:-${(i * .17).toFixed(2)}s; height:${20 + Math.round(60 * Math.abs(Math.sin(i * 1.7)))}%"></i>`;
      wave.innerHTML = bars;
    }
    document.querySelectorAll('#dots i').forEach((d, i) => d.classList.toggle('on', i < Math.min(24, act * 2)));
    if (D.generated_at) $('uptime-ro').innerHTML = `SYNC <b>${esc(D.generated_at)}</b>`;

    // substrip: honest readouts
    $('node-ro').textContent = location.hostname === '127.0.0.1' || location.hostname === 'localhost'
      ? 'LOCAL (MAC)' : 'SECURE LINK';
    $('vault-ro').textContent = (D.vault_notes || []).length + ' NOTES';
    const allT = D.tasks || [];
    const doneT = allT.filter(t => t.status === 'done').length;
    const pctT = allT.length ? Math.round(100 * doneT / allT.length) : 0;
    $('g-tasks').setAttribute('stroke-dasharray', `${Math.round(95 * pctT / 100)} 95`);
    $('g-tasks-t').textContent = pctT + '%';
    const ikAll = (D.intake && D.intake.counts) || {};
    const handled = (ikAll.accepted || 0) + (ikAll.dismissed || 0);
    const totalIk = handled + (ikAll.new || 0);
    const pctI = totalIk ? Math.round(100 * handled / totalIk) : 100;
    $('g-intake').setAttribute('stroke-dasharray', `${Math.round(95 * pctI / 100)} 95`);
    $('g-intake-t').textContent = pctI + '%';
  }

  async function loadData() {
    try {
      const [home, dash] = await Promise.all([
        fetch('/api/home').then(r => r.json()).catch(() => ({})),
        fetch('/api/dashboard').then(r => r.json()).catch(() => ({})),
      ]);
      D = Object.assign({}, home, dash, { intake: home.intake || dash.intake });
      renderPanels();
    } catch (e) {}
  }
  loadData(); setInterval(loadData, 30000);

  // ============ modals ============
  const veil = $('veil');
  function openModal(title, bodyHtml) {
    $('m-title').textContent = title;
    $('m-body').innerHTML = bodyHtml;
    veil.classList.add('open');
  }
  function closeModal() { veil.classList.remove('open'); }
  $('m-close').addEventListener('click', closeModal);
  veil.addEventListener('click', (e) => { if (e.target === veil) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  const MODALS = {
    tasks() {
      const tasks = D.tasks || [];
      openModal('TASKS — FULL LIST', rows(tasks, t => `
        <div class="row"><div class="r-t">${esc(t.title)}</div>
        <div class="r-m">#${t.id} · ${esc(t.status)} · urgency ${t.urgency || 0} · importance ${t.importance || 0}</div></div>`,
        'No tasks. Say "add a task…" in the command bar.'));
    },
    today() {
      openModal('TODAY — CALENDAR', rows(D.today_events || [], e => `
        <div class="row"><div class="r-t">${esc(e.summary || e.title || '(untitled)')}</div>
        <div class="r-m">${esc(e.start || e.when || '')}${e.end ? ' → ' + esc(e.end) : ''}</div></div>`,
        'Nothing on the calendar today.'));
    },
    system() {
      const h = D.health || {}; const mon = D.monitor || {};
      const checks = (h.checks || []).map(c => `
        <div class="row"><div class="r-t">${esc(c.name || '')}: ${esc(c.status || '')}</div>
        <div class="r-m">${esc(c.detail || '')}</div></div>`).join('');
      const inc = (mon.incidents || []).map(i => `
        <div class="row"><div class="r-t">${esc(i.message || '')}</div>
        <div class="r-m">${esc(i.level || '')} · ${esc(i.component || '')} · ${esc(i.at || '')}</div></div>`).join('');
      openModal('SYSTEM — HEALTH + INCIDENTS',
        (checks || '<div class="empty">No checks reported.</div>') +
        '<div class="m-head" style="margin-top:12px">INCIDENTS</div>' +
        (inc || '<div class="empty">Incident log is quiet.</div>'));
    },
    intake() {
      const ik = (D.intake && D.intake.recent) || [];
      const srcIcon = { imessage: '💬', gmail: '✉️', calendar: '📅', inbox: '📥' };
      openModal('INTAKE — TRIAGE', rows(ik.filter(r => r.status === 'new'), r => `
        <div class="row"><div class="r-t">${srcIcon[r.source] || '•'} ${esc(r.sender || r.source)}</div>
        ${(r.items || []).map(i => `<div class="r-m">› [${esc(i.type)}] ${esc(i.text)}${i.due ? ' — due ' + esc(i.due) : ''}</div>`).join('')}
        <div>
          <button class="mini" onclick="intakeAct(${r.id}, 'accept', this)">Accept → tasks</button>
          <button class="mini no" onclick="intakeAct(${r.id}, 'dismiss', this)">Dismiss</button>
        </div>
        <div class="r-m">#${r.id} · ${esc(r.source)} · ${esc(r.ts || '')}</div></div>`,
        'Intake is clear. New texts, emails and calendar changes land here.'));
    },
    approvals() {
      openModal('APPROVALS — PENDING ACTIONS', rows(D.pending_actions || [], a => `
        <div class="row"><div class="r-t">${esc(a.summary || a.action || 'action')}</div>
        <div class="r-m">#${a.id}${a.created_at ? ' · ' + esc(a.created_at) : ''}</div>
        <div>
          <button class="mini" onclick="approveAct(${a.id}, 'approve', this)">Approve</button>
          <button class="mini no" onclick="approveAct(${a.id}, 'deny', this)">Deny</button>
        </div></div>`,
        'Nothing needs your sign-off.'));
    },
    ops() {
      const mo = (D.money && D.money.recent) || [];
      const ex = (D.expansion && D.expansion.recent) || [];
      openModal('OPERATIONS — MONEY + EXPANSION',
        '<div class="m-head">MONEY PIPELINE</div>' +
        rows(mo.slice(0, 6), f => `
          <div class="row"><div class="r-t">${esc(f.name || '(unnamed)')} ${f.decision ? `<span class="pill">${esc(f.decision)}</span>` : ''}</div>
          <div class="r-m">#${f.id} · ${esc(f.status || '')}${f.profit != null ? ` · ~$${esc(String(f.profit))}/mo` : ''}</div></div>`,
        'No money ideas yet — say "run the money scouts".') +
        '<div class="m-head" style="margin-top:12px">EXPANSION PIPELINE</div>' +
        rows(ex.slice(0, 6), f => `
          <div class="row"><div class="r-t">${esc(f.name || f.url || '(unnamed)')} ${f.decision ? `<span class="pill">${esc(f.decision)}</span>` : ''}</div>
          <div class="r-m">#${f.id} · ${esc(f.status || '')}</div></div>`,
        'No findings yet — the daily scout reports here.'));
    },
  };
  document.querySelectorAll('[data-modal]').forEach(el => {
    const open = () => { if (MODALS[el.dataset.modal]) MODALS[el.dataset.modal](); };
    el.addEventListener('click', open);
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } });
  });

  async function intakeAct(id, action, btn) {
    btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
    try {
      await fetch('/api/intake/act', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action }),
      });
    } catch (e) {}
    await loadData();
    MODALS.intake();
  }
  async function approveAct(id, decision, btn) {
    btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
    try {
      const res = await fetch('/api/approve', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, decision }),
      });
      const data = await res.json();
      if (!data.ok) alert(data.error || 'Something went wrong.');
    } catch (e) { alert('Could not reach the server.'); }
    await loadData();
    MODALS.approvals();
  }

  loadHistory();
  cmd.focus();
</script>
</body>
</html>
