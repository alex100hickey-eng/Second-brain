/* ============================================================
   CLARVIS HUD — v5: rebuilt against the HI-RES reference
   (extracted from Alex's diff report) with sampled colors.
   Their palette is turquoise-cyan on near-black navy with a
   strong center glow. Visuals only; stage 2 adds function.
   ============================================================ */
html, body { height: 100%; margin: 0; background: #010A20; overflow: hidden; }
#scene { width: 100vw; height: 100vh; height: 100dvh; display: block; }

.spin-slow   { transform-origin: 760px 440px; animation: rot 150s linear infinite; }
.spin-blades { transform-origin: 760px 440px; animation: rot 100s linear infinite reverse; }
.spin-mid    { transform-origin: 760px 440px; animation: rot 64s linear infinite; }
.spin-inner  { transform-origin: 760px 440px; animation: rot 40s linear infinite reverse; }
.spin-micro  { transform-origin: 760px 440px; animation: rot 30s linear infinite; }
.turb-spin   { transform-origin: 655px 880px; animation: rot 80s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.core-pulse { transform-origin: 760px 440px; animation: pulse 3.4s ease-in-out infinite; }
@keyframes pulse { 50% { transform: scale(1.05); opacity: .94; } }
.emblem-spin { transform-origin: 658px 135px; animation: rot 24s linear infinite reverse; }
.ecg-sweep { stroke-dasharray: 60 500; animation: ecg 3.4s linear infinite; }
@keyframes ecg { from { stroke-dashoffset: 560; } to { stroke-dashoffset: 0; } }
.chev { animation: chevflow 1.6s linear infinite; }
@keyframes chevflow { 0%, 100% { opacity: .3; } 30% { opacity: 1; } }
.blink-soft { animation: bl 3s ease-in-out infinite; }
@keyframes bl { 50% { opacity: .4; } }
.dish-spin { transform-origin: 1092px 862px; animation: rot 12s linear infinite; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>

<g>
  <path class="ln" stroke-width="2" d="M 1332 918 v -26 l 14 -5 v 26" fill="none"/>

  <rect x="1372" y="900" width="122" height="34" rx="4" class="ln" stroke-width="1.5" fill="none"/>

<!-- micro labels + markers -->
<g class="txtd" font-size="12">
  <text x="470" y="250" class="blink-soft">+</text>
  <text x="1010" y="320">+</text>

  <text x="586" y="238" font-size="9">SCN.04</text>

</svg>

<script>
  const NS = 'http://www.w3.org/2000/svg';
  const put = (parent, tag, attrs, text) => {
    const el = document.createElementNS(NS, tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    if (text != null) el.textContent = text;
    document.getElementById(parent).appendChild(el);
    return el;
  };
  const P = (cx, cy, r, a) => [cx + r * Math.sin(a), cy - r * Math.cos(a)];

  // ---- floor: perspective grid (their floor is subtle, dark steel blue) ----
  (function floor() {
    const VP = { x: 740, y: 660 }, HY = 758;
    const ys = [758, 770, 786, 808, 836, 870, 910, 956];
    ys.forEach((y, i) => put('floor', 'line', { x1: 0, y1: y, x2: 1600, y2: y,
      stroke: '#1E4A80', 'stroke-width': i === 0 ? 1.5 : 1,
      opacity: i === 0 ? .5 : .22 + i * .015 }));
    for (let xb = -500; xb <= 2100; xb += 130) {
      const t = (HY - VP.y) / (1000 - VP.y);
      const xh = VP.x + (xb - VP.x) * t;
      put('floor', 'line', { x1: xh, y1: HY, x2: xb, y2: 1000,
        stroke: '#1E4A80', 'stroke-width': 1, opacity: .2 });
    }
  })();

  // ---- TL audio bars ----
  const tlh = [26, 44, 18, 52, 34, 46, 22, 58, 38, 30, 48, 24, 40, 18, 34, 26, 44, 20];
  tlh.forEach((h, i) => put('tlbars', 'rect', { x: 44 + i * 11, y: 82 - h, width: 6, height: h,
    fill: i % 3 ? 'rgba(79,212,232,.55)' : '#6FE6F2' }));
  // ---- candlestick cluster ----
  [[420, 58, 30], [438, 50, 44], [456, 64, 22], [474, 46, 40], [492, 56, 30]].forEach(([x, y, h]) => {
    put('candles', 'line', { x1: x + 4, y1: y - 10, x2: x + 4, y2: y + h + 10,
      stroke: 'rgba(79,212,232,.5)', 'stroke-width': 1 });
    put('candles', 'rect', { x, y, width: 8, height: h, fill: 'rgba(111,230,242,.65)' });
  });

  // ---- donuts 30/50/70 with dot connectors ----
  [[91, 152, 30], [211, 150, 50], [329, 148, 70]].forEach(([cx, cy, pct], idx) => {
    const C = 2 * Math.PI * 33;
    put('donuts', 'circle', { cx, cy, r: 33, fill: 'none',
      stroke: 'rgba(79,212,232,.25)', 'stroke-width': 12 });
    put('donuts', 'circle', { cx, cy, r: 33, fill: 'none', stroke: '#4FD4E8',
      'stroke-width': 12, 'stroke-dasharray': `${C * pct / 100} ${C}`,
      transform: `rotate(-90 ${cx} ${cy})` });
    put('donuts', 'text', { x: cx - 17, y: cy + 5, 'font-size': 14, fill: '#D9F8FF' }, pct + '%');
    if (idx < 2) {
      put('donuts', 'line', { x1: cx + 36, y1: cy, x2: cx + 76, y2: cy,
        stroke: 'rgba(79,212,232,.5)', 'stroke-width': 1.5 });
      put('donuts', 'circle', { cx: cx + 56, cy, r: 5, fill: '#4FD4E8' });
    }
  });

  // ---- wide noisy dot matrix ----
  for (let r = 0; r < 6; r++) for (let c = 0; c < 30; c++) {
    const v = (r * 31 + c * 7) % 9;
    put('dotmatrix', 'rect', { x: 70 + c * 11.5, y: 226 + r * 12, width: 6, height: 6,
      fill: v < 3 ? '#5FDCEF' : v < 6 ? 'rgba(79,212,232,.4)' : 'rgba(79,212,232,.12)' });
  }
  for (let i = 0; i < 9; i++)
    put('progbar', 'rect', { x: 219 + i * 15, y: 304, width: 10, height: 8,
      fill: i < 6 ? 'rgba(111,230,242,.7)' : 'rgba(79,212,232,.15)' });

  // ---- hex panels ----
  function hexPanel(id, x, y, w, h, pct, hexR) {
    put(id, 'rect', { x, y, width: w, height: h, class: 'ln2 fillT', 'stroke-width': 1 });
    [.72, .45, .86].forEach((f, i) => {
      const cy = y + 28 + i * 34, C = 2 * Math.PI * 12;
      put(id, 'circle', { cx: x + 28, cy, r: 12, fill: 'none',
        stroke: 'rgba(79,212,232,.3)', 'stroke-width': 5 });
      put(id, 'circle', { cx: x + 28, cy, r: 12, fill: 'none', stroke: '#4FD4E8',
        'stroke-width': 5, 'stroke-dasharray': `${C * f} ${C}`,
        transform: `rotate(-90 ${x + 28} ${cy})` });
    });
    [52, 38, 45].forEach((len, i) =>
      put(id, 'line', { x1: x + 52, y1: y + 22 + i * 12, x2: x + 52 + len, y2: y + 22 + i * 12,
        stroke: i === 1 ? '#9BF2FA' : 'rgba(79,212,232,.6)', 'stroke-width': 4 }));
    put(id, 'text', { x: x + 54, y: y + 86, 'font-size': 19, fill: '#D9F8FF' }, pct);
    const hx = x + w - hexR - 22, hy = y + h / 2;
    let d = '';
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i + Math.PI / 6;
      d += (i ? 'L' : 'M') + (hx + hexR * Math.cos(a)) + ' ' + (hy + hexR * Math.sin(a)) + ' ';
    }
    put(id, 'path', { d: d + 'Z', fill: 'none', stroke: '#4FD4E8', 'stroke-width': 1.5 });
    put(id, 'circle', { cx: hx, cy: hy, r: hexR * .55, fill: 'none',
      stroke: 'rgba(79,212,232,.6)', 'stroke-width': 1 });
    put(id, 'line', { x1: hx - hexR * .8, y1: hy, x2: hx + hexR * .8, y2: hy,
      stroke: 'rgba(79,212,232,.5)', 'stroke-width': 1 });
    put(id, 'line', { x1: hx, y1: hy - hexR * .8, x2: hx, y2: hy + hexR * .8,
      stroke: 'rgba(79,212,232,.5)', 'stroke-width': 1 });
    put(id, 'circle', { cx: hx, cy: hy, r: 8, fill: '#D9F8FF' });
    put(id, 'text', { x: hx - 32, y: y + h - 10, 'font-size': 9,
      fill: 'rgba(150,225,245,.7)' }, '0.002157');
  }
  hexPanel('hexA', 368, 520, 240, 128, '75%', 38);
  hexPanel('hexB', 124, 716, 230, 116, '100%', 34);

  // ---- seg bar + dot row + dash row ----
  for (let i = 0; i < 12; i++)
    put('segbar', 'rect', { x: 196 + i * 19, y: 638, width: 13, height: 11,
      fill: i < 8 ? 'rgba(111,230,242,.7)' : 'rgba(79,212,232,.15)' });
  put('segbar', 'rect', { x: 192, y: 634, width: 234, height: 19, fill: 'none',
    stroke: 'rgba(79,212,232,.45)', 'stroke-width': 1 });
  for (let i = 0; i < 11; i++)
    put('dotrow', 'circle', { cx: 200 + i * 16, cy: 668, r: 3,
      fill: i % 4 ? 'rgba(79,212,232,.4)' : '#6FE6F2' });
  for (let i = 0; i < 12; i++)
    put('dashrow', 'line', { x1: 200 + i * 13, y1: 690, x2: 193 + i * 13, y2: 700,
      stroke: i % 5 === 0 ? '#9BF2FA' : 'rgba(79,212,232,.5)', 'stroke-width': 2 });

  // ---- tall sliders ----
  [[52, 570, 250, 7], [74, 600, 260, 5], [96, 640, 200, 8]].forEach(([x, y, h, seg]) => {
    put('sliders', 'rect', { x, y, width: 10, height: h, fill: 'none',
      stroke: 'rgba(79,212,232,.4)', 'stroke-width': 1 });
    for (let i = 0; i < seg; i++)
      put('sliders', 'rect', { x: x + 2, y: y + h - 14 - i * 24, width: 6, height: 16,
        fill: i < seg - 1 ? 'rgba(111,230,242,.7)' : '#9BF2FA' });
  });

  // ---- stacks + spectrum ----
  [10, 6, 13, 8, 11].forEach((n, c) => {
    for (let i = 0; i < n; i++)
      put('stacks', 'rect', { x: 178 + c * 15, y: 964 - i * 7, width: 10, height: 4,
        fill: i % 4 === 3 ? '#6FE6F2' : 'rgba(79,212,232,.5)' });
  });
  const spec = [8, 16, 11, 26, 19, 38, 26, 46, 33, 22, 40, 17, 30, 12, 21, 9, 15, 24, 10, 18];
  spec.forEach((h, i) => put('spectrum', 'rect',
    { x: 408 + i * 10, y: 962 - h, width: 5, height: h,
      fill: i % 4 === 1 ? '#6FE6F2' : 'rgba(79,212,232,.5)' }));

  // ---- mandala generated layers ----
  for (let i = 0; i < 72; i++) {
    const a = i / 72 * 2 * Math.PI;
    const [x1, y1] = P(760, 440, i % 6 === 0 ? 222 : 228, a);
    const [x2, y2] = P(760, 440, 238, a);
    put('oticks', 'line', { x1, y1, x2, y2, stroke: '#4FD4E8',
      'stroke-width': i % 6 === 0 ? 2 : 1, opacity: i % 6 === 0 ? .85 : .4 });
  }
  for (let i = 0; i < 48; i++) {
    const a = i / 48 * 2 * Math.PI;
    const [cx, cy] = P(760, 440, 208, a);
    put('dotring', 'circle', { cx, cy, r: 2, fill: i % 4 ? 'rgba(79,212,232,.45)' : '#6FE6F2' });
  }
  const jit = [0, 3, -3, 2, 4, -2, 3, -4, 2, -3, 4, -2, 3, -3, 2, -4];
  for (let i = 0; i < 16; i++) {
    const fam = i % 3;
    const r0 = fam === 0 ? 200 : fam === 1 ? 190 : 178;
    const r1 = fam === 0 ? 154 : fam === 1 ? 148 : 154;
    const w0 = fam === 0 ? 20 : fam === 1 ? 17 : 13;
    const w1 = fam === 0 ? 14 : fam === 1 ? 11 : 9;
    const bright = i % 5 === 0;
    put('blades', 'path', {
      d: `M ${-w0} ${-r0} L ${w0} ${-r0} L ${w1} ${-r1} L ${-w1} ${-r1} Z`,
      fill: bright ? 'rgba(140,235,252,0.30)' : 'rgba(120,220,250,0.12)',
      stroke: bright ? '#9BF2FA' : '#5FDCEF', 'stroke-width': bright ? 1.5 : 1,
      transform: `rotate(${i * 22.5 + jit[i]} 760 440) translate(760 440)` });
  }
  for (let i = 0; i < 24; i++) {
    const a0 = i / 24 * 360 + 2, a1 = a0 + 11;
    const [x0, y0] = P(760, 440, 140, a0 * Math.PI / 180);
    const [x1, y1] = P(760, 440, 140, a1 * Math.PI / 180);
    put('microseg', 'path', { d: `M ${x0} ${y0} A 140 140 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 2 ? '#4FD4E8' : 'rgba(79,212,232,.35)', 'stroke-width': 5 });
  }
  for (let i = 0; i < 12; i++) {
    const a = i / 12 * 2 * Math.PI;
    const [x1, y1] = P(760, 440, 92, a);
    const [x2, y2] = P(760, 440, 116, a);
    put('spokes', 'line', { x1, y1, x2, y2, stroke: 'rgba(79,212,232,.5)', 'stroke-width': 2 });
  }

  // ---- banner data bars (two columns of dashes) ----
  for (let r = 0; r < 12; r++) {
    const w1 = 30 + ((r * 37) % 45), w2 = 22 + ((r * 23) % 38);
    put('databars', 'rect', { x: 724, y: 86 + r * 9, width: w1, height: 4,
      fill: r % 3 ? 'rgba(79,212,232,.55)' : '#6FE6F2' });
    put('databars', 'rect', { x: 724 + 62, y: 86 + r * 9, width: w2, height: 4,
      fill: r % 4 ? 'rgba(79,212,232,.4)' : '#6FE6F2' });
  }
  // ---- dotted rows under 99%/20% ----
  for (let i = 0; i < 14; i++)
    put('dotted99', 'circle', { cx: 948 + i * 9, cy: 232, r: 1.8,
      fill: 'rgba(79,212,232,.6)' });

  // ---- hex grid (honeycomb) ----
  (function hexgrid() {
    const R = 13, ox = 962, oy = 96;
    for (let r = 0; r < 2; r++) for (let c = 0; c < 5; c++) {
      const cx = ox + c * (R * 1.74) + (r % 2 ? R * .87 : 0), cy = oy + r * (R * 1.5);
      let d = '';
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i + Math.PI / 6;
        d += (i ? 'L' : 'M') + (cx + R * Math.cos(a)) + ' ' + (cy + R * Math.sin(a)) + ' ';
      }
      const filled = (r * 5 + c) % 3 === 0;
      put('hexgrid', 'path', { d: d + 'Z', fill: filled ? 'rgba(79,212,232,.35)' : 'none',
        stroke: '#4FD4E8', 'stroke-width': 1 });
    }
  })();
  // ---- stripes + capsule segments + battery segments ----
  for (let i = 0; i < 7; i++)
    put('stripes', 'line', { x1: 972 + i * 15, y1: 152, x2: 958 + i * 15, y2: 186,
      stroke: i % 2 ? '#6FE6F2' : 'rgba(79,212,232,.35)', 'stroke-width': 5 });
  for (let i = 0; i < 14; i++)
    put('capsegs', 'rect', { x: 1182 + i * 13, y: 78, width: 8, height: 12,
      fill: i < 9 ? 'rgba(111,230,242,.65)' : 'rgba(79,212,232,.15)' });
  for (let i = 0; i < 5; i++)
    put('batsegs', 'rect', { x: 1330, y: 328 - i * 15, width: 30, height: 10,
      fill: i < 4 ? 'rgba(111,230,242,.7)' : 'rgba(79,212,232,.2)' });

  // ---- compass ticks ----
  for (let i = 0; i < 48; i++) {
    const a = i / 48 * 2 * Math.PI;
    const [x1, y1] = P(1090, 442, i % 12 === 0 ? 62 : 68, a);
    const [x2, y2] = P(1090, 442, 76, a);
    put('compassticks', 'line', { x1, y1, x2, y2, stroke: '#4FD4E8',
      'stroke-width': 1, opacity: i % 12 === 0 ? .9 : .4 });
  }
  // ---- bracket panel: gear ring + bars ----
  for (let i = 0; i < 10; i++) {
    const a0 = i / 10 * 360, a1 = a0 + 24;
    const [x0, y0] = P(1268, 428, 28, a0 * Math.PI / 180);
    const [x1, y1] = P(1268, 428, 28, a1 * Math.PI / 180);
    put('gearring', 'path', { d: `M ${x0} ${y0} A 28 28 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 2 ? '#6FE6F2' : 'rgba(79,212,232,.4)', 'stroke-width': 8 });
  }
  [18, 30, 12, 24].forEach((h, i) => put('brkbars', 'rect',
    { x: 1236 + i * 12, y: 500 - h, width: 7, height: h, fill: 'rgba(111,230,242,.6)' }));

  // ---- flower triple panel ----
  for (let i = 0; i < 10; i++) {
    const a0 = i / 10 * 360, a1 = a0 + 22;
    const [x0, y0] = P(1030, 650, 24, a0 * Math.PI / 180);
    const [x1, y1] = P(1030, 650, 24, a1 * Math.PI / 180);
    put('ringspiral', 'path', { d: `M ${x0} ${y0} A 24 24 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 2 ? '#4FD4E8' : 'rgba(79,212,232,.3)', 'stroke-width': 6 });
  }
  put('flower', 'circle', { cx: 1120, cy: 650, r: 26, fill: 'none',
    stroke: 'rgba(79,212,232,.5)', 'stroke-width': 1 });
  for (let i = 0; i < 7; i++) {
    const a = i / 6 * 2 * Math.PI;
    const cx = i === 6 ? 1120 : 1120 + 13 * Math.cos(a);
    const cy = i === 6 ? 650 : 650 + 13 * Math.sin(a);
    put('flower', 'circle', { cx, cy, r: 13, fill: 'none',
      stroke: '#4FD4E8', 'stroke-width': 1 });
  }
  for (let i = 0; i < 16; i++) {
    const a = i / 16 * 2 * Math.PI;
    const [cx, cy] = P(1210, 650, 20, a);
    put('dotburst', 'circle', { cx, cy, r: 2.2, fill: i % 2 ? 'rgba(79,212,232,.5)' : '#6FE6F2' });
  }
  put('dotburst', 'circle', { cx: 1210, cy: 650, r: 8, fill: 'none',
    stroke: '#4FD4E8', 'stroke-width': 1.5 });

  // ---- wide dash-matrix band (right of mandala) ----
  for (let r = 0; r < 4; r++) for (let c = 0; c < 34; c++) {
    const v = (r * 29 + c * 11) % 10;
    if (v > 7) continue;   // gaps make it read "noisy" like the art
    put('dashband', 'rect', { x: 1000 + c * 15, y: 548 + r * 13, width: 9, height: 5,
      fill: v < 3 ? '#5FDCEF' : v < 6 ? 'rgba(79,212,232,.4)' : 'rgba(79,212,232,.15)' });
  }

  // ---- long chevrons ----
  for (let i = 0; i < 10; i++) {
    const el = put('chevrons', 'path', { d: `M ${986 + i * 26} 706 l 15 13 l -15 13`,
      fill: 'none', stroke: '#9BF2FA', 'stroke-width': 4, class: 'chev' });
    el.style.animationDelay = (i * 0.14) + 's';
  }
  // ---- plane panel bars ----
  [12, 22, 16].forEach((h, i) => put('planebars', 'rect',
    { x: 1398 + i * 11, y: 700 - h, width: 6, height: h, fill: 'rgba(111,230,242,.6)' }));

  // ---- turbine ----
  for (let i = 0; i < 8; i++) {
    if (i === 2 || i === 6) continue;
    const a0 = i * 45 + 4, a1 = a0 + 34;
    const r0 = 168, r1 = 118;
    const p0 = P(655, 880, r0, a0 * Math.PI / 180), p1 = P(655, 880, r0, a1 * Math.PI / 180);
    const p2 = P(655, 880, r1, (a1 - 4) * Math.PI / 180), p3 = P(655, 880, r1, (a0 + 4) * Math.PI / 180);
    put('turbblades', 'path', {
      d: `M ${p0[0]} ${p0[1]} A ${r0} ${r0} 0 0 1 ${p1[0]} ${p1[1]} L ${p2[0]} ${p2[1]} A ${r1} ${r1} 0 0 0 ${p3[0]} ${p3[1]} Z`,
      fill: 'rgba(90,205,240,.28)', stroke: '#5FDCEF', 'stroke-width': 1 });
  }
  for (let i = 0; i < 48; i++) {
    const a = i / 48 * 2 * Math.PI;
    const [x1, y1] = P(655, 880, 86, a);
    const [x2, y2] = P(655, 880, i % 4 === 0 ? 70 : 78, a);
    put('turbticks', 'line', { x1, y1, x2, y2, stroke: '#4FD4E8',
      'stroke-width': 1, opacity: i % 4 === 0 ? .8 : .4 });
  }
  // ---- ring row ----
  [[330, 800, 12, .8], [376, 796, 16, .5], [428, 792, 14, .7], [480, 790, 18, .4], [534, 792, 13, .85]]
  .forEach(([cx, cy, r, f]) => {
    const C = 2 * Math.PI * r;
    put('ringrow', 'circle', { cx, cy, r, fill: 'none',
      stroke: 'rgba(79,212,232,.3)', 'stroke-width': 5 });
    put('ringrow', 'circle', { cx, cy, r, fill: 'none', stroke: '#5FDCEF',
      'stroke-width': 5, 'stroke-dasharray': `${C * f} ${C}`,
      transform: `rotate(${(cx * 3) % 360} ${cx} ${cy})` });
    put('ringrow', 'circle', { cx, cy, r: 3, fill: '#D9F8FF' });
  });
  // ---- dish ring segments ----
  for (let i = 0; i < 14; i++) {
    const a0 = i / 14 * 360 + 2, a1 = a0 + 20;
    const [x0, y0] = P(1092, 862, 68, a0 * Math.PI / 180);
    const [x1, y1] = P(1092, 862, 68, a1 * Math.PI / 180);
    put('dishring', 'path', { d: `M ${x0} ${y0} A 68 68 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 3 === 2 ? 'rgba(79,212,232,.3)' : '#4FD4E8', 'stroke-width': 7 });
  }
</script>
