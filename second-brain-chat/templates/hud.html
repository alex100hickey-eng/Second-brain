/* ============================================================
   CLARVIS HUD — pixel-faithful recreation of the reference art, v3.
   Built from the hi-res crops: 3D cone, hexagon panels, tech-frame
   vitals, binary blocks, capsule bars, turbine floor gauge — and the
   PERSPECTIVE FLOOR that gives the scene its depth.
   Visuals only (stage 1); functionality returns in stage 2.
   ============================================================ */
html, body { height: 100%; margin: 0; background: #03102C; overflow: hidden; }
#scene { width: 100vw; height: 100vh; height: 100dvh; display: block; }

.spin-slow   { transform-origin: 823px 428px; animation: rot 150s linear infinite; }
.spin-blades { transform-origin: 823px 428px; animation: rot 100s linear infinite reverse; }
.spin-mid    { transform-origin: 823px 428px; animation: rot 64s linear infinite; }
.spin-inner  { transform-origin: 823px 428px; animation: rot 40s linear infinite reverse; }
.turb-spin   { transform-origin: 1010px 885px; animation: rot 70s linear infinite; }
@keyframes rot { to { transform: rotate(360deg); } }
.core-pulse { transform-origin: 823px 428px; animation: pulse 3.4s ease-in-out infinite; }
@keyframes pulse { 50% { transform: scale(1.05); opacity: .94; } }
.sweep1 { transform-origin: 754px 109px; animation: rot 5s linear infinite; }
.sweep2 { transform-origin: 695px 190px; animation: rot 8s linear infinite reverse; }
.ecg-sweep { stroke-dasharray: 70 560; animation: ecg 3.4s linear infinite; }
@keyframes ecg { from { stroke-dashoffset: 630; } to { stroke-dashoffset: 0; } }
.chev { animation: chevflow 1.6s linear infinite; }
.chev:nth-child(2) { animation-delay: .18s; } .chev:nth-child(3) { animation-delay: .36s; }
.chev:nth-child(4) { animation-delay: .54s; } .chev:nth-child(5) { animation-delay: .72s; }
@keyframes chevflow { 0%, 100% { opacity: .3; } 30% { opacity: 1; } }
.blink-soft { animation: bl 3s ease-in-out infinite; }
@keyframes bl { 50% { opacity: .4; } }
.loader-spin { transform-origin: 1143px 862px; animation: rot 6s linear infinite; }
.ringbr-a { transform-origin: 330px 500px; animation: rot 26s linear infinite; }
.ringbr-b { transform-origin: 330px 500px; animation: rot 20s linear infinite reverse; }
@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>

    <circle cx="1152" cy="848" r="2.5" fill="#7FDCFB" stroke="none"/>
    <path d="M 1128 874 h 18"/>
  </g>
  <g id="ruler"></g>
  <path class="ln" stroke-width="1.5" d="M 1284 900 h -14 v 48 h 14 M 1478 900 h 14 v 48 h -14"/>
  <rect x="1291" y="909" width="180" height="30" rx="4" class="ln" stroke-width="1.5" fill="none"/>
  <rect x="1297" y="915" width="130" height="18" rx="2" fill="rgba(63,187,239,.55)"/>
  <text x="1300" y="900" font-size="11" class="txtd">100%</text>
</g>

<!-- ================= PAGINATION DOTS ================= -->
<g id="pagedots"></g>

<!-- ================= CIRCUIT TRACES + NODES ================= -->
<g class="ln2" stroke-width="1">
  <path d="M 332 300 l 60 40 H 560 l 30 30"/>
  <path d="M 268 592 H 420 l 60 -36 H 600"/>
  <path d="M 588 700 H 700 l 40 40 v 50"/>
  <path d="M 1162 369 H 1080 l -40 34"/>
  <path d="M 1100 540 H 1010 l -36 -30"/>
  <path d="M 1143 806 V 770 l -30 -30"/>
  <path d="M 430 100 l -34 34 H 300"/>
  <path d="M 662 486 l 40 40 v 30"/>
</g>
<g>
  <circle cx="594" cy="373" r="4" class="node" stroke-width="1"/>
  <circle cx="604" cy="556" r="4" class="node" stroke-width="1"/>
  <circle cx="740" cy="792" r="4" class="node" stroke-width="1"/>
  <circle cx="1036" cy="403" r="4" class="node" stroke-width="1"/>
  <circle cx="970" cy="510" r="4" class="node" stroke-width="1"/>
  <circle cx="296" cy="134" r="4" class="node" stroke-width="1"/>
  <circle cx="702" cy="560" r="4" class="node" stroke-width="1"/>
</g>

<g class="txtd" font-size="12">
  <text x="380" y="212" class="blink-soft">+</text>
  <text x="1216" y="300">+</text>
  <text x="560" y="782" class="blink-soft">+</text>
  <text x="1078" y="160">+</text>
  <text x="948" y="640">+</text>
  <text x="636" y="248" font-size="9">SCN.04</text>
  <text x="962" y="672" font-size="9">LNK.77</text>
  <text x="452" y="540" font-size="9">MDL.19</text>
</g>
</svg>

<script>
  const NS = 'http://www.w3.org/2000/svg';
  const put = (parent, tag, attrs, text) => {
    const el = document.createElementNS(NS, tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    if (text != null) el.textContent = text;
    document.getElementById(parent).appendChild(el);
    return el;
  };
  const P = (cx, cy, r, a) => [cx + r * Math.sin(a), cy - r * Math.cos(a)];

  // ================= FLOOR: perspective grid =================
  // Horizon at y=740; vanishing point above it so verticals converge.
  (function floor() {
    const VP = { x: 800, y: 640 }, HY = 740;
    const ys = [740, 752, 768, 790, 818, 852, 892, 938, 990];
    ys.forEach((y, i) => put('floor', 'line', { x1: 0, y1: y, x2: 1600, y2: y,
      stroke: '#2E7FD9', 'stroke-width': i === 0 ? 1.5 : 1,
      opacity: i === 0 ? .35 : .10 + i * .012 }));
    for (let xb = -400; xb <= 2000; xb += 133) {
      const t = (HY - VP.y) / (1000 - VP.y);
      const xh = VP.x + (xb - VP.x) * t;
      put('floor', 'line', { x1: xh, y1: HY, x2: xb, y2: 1000,
        stroke: '#2E7FD9', 'stroke-width': 1, opacity: .13 });
    }
  })();

  // ---- center reticle ticks ----
  for (let i = 0; i < 78; i++) {
    const a = i / 78 * 2 * Math.PI;
    const [x1, y1] = P(823, 428, i % 6 === 0 ? 234 : 242, a);
    const [x2, y2] = P(823, 428, 252, a);
    put('oticks', 'line', { x1, y1, x2, y2, stroke: '#3FBBEF',
      'stroke-width': i % 6 === 0 ? 2 : 1, opacity: i % 6 === 0 ? .85 : .4 });
  }
  // ---- petals (irregular shards) ----
  const jit = [0, 4, -4, 3, 5, -3, 4, -5, 2, -4, 5, -2];
  for (let i = 0; i < 12; i++) {
    // three petal families: reach, width, and brightness all vary like the art
    const fam = i % 3;
    const r0 = fam === 0 ? 228 : fam === 1 ? 214 : 198;
    const r1 = fam === 0 ? 168 : fam === 1 ? 160 : 168;
    const w0 = fam === 0 ? 30 : fam === 1 ? 26 : 20;
    const w1 = fam === 0 ? 20 : fam === 1 ? 17 : 13;
    const bright = i % 4 === 0;
    put('blades', 'path', {
      d: `M ${-w0} ${-r0} L ${w0} ${-r0} L ${w1} ${-r1} L ${-w1} ${-r1} Z`,
      fill: bright ? 'rgba(140,220,252,0.30)' : 'rgba(120,210,250,0.12)',
      stroke: bright ? '#8FE0FC' : '#5FCBF6', 'stroke-width': bright ? 1.6 : 1.1,
      transform: `rotate(${i * 30 + jit[i]} 823 428) translate(823 428)` });
  }
  // ---- TL donuts ----
  [[51, 190, 40], [125, 183, 50], [199, 176, 70]].forEach(([cx, cy, pct]) => {
    const C = 2 * Math.PI * 27;
    put('donuts', 'circle', { cx, cy, r: 27, fill: 'none',
      stroke: 'rgba(63,187,239,.25)', 'stroke-width': 7 });
    put('donuts', 'circle', { cx, cy, r: 27, fill: 'none', stroke: '#3FBBEF',
      'stroke-width': 7, 'stroke-linecap': 'round',
      'stroke-dasharray': `${C * pct / 100} ${C}`, transform: `rotate(-90 ${cx} ${cy})` });
    put('donuts', 'text', { x: cx - 15, y: cy + 4, 'font-size': 12, fill: '#CFF2FF' }, pct + '%');
  });
  put('donuts', 'path', { d: 'M 78 187 L 98 184 M 152 180 L 172 178',
    stroke: 'rgba(63,187,239,.45)', 'stroke-width': 1 });
  // ---- TL dot matrix ----
  for (let r = 0; r < 5; r++) for (let c = 0; c < 13; c++)
    put('dotmatrixTL', 'rect', { x: 38 + c * 15, y: 258 + r * 15, width: 7, height: 7,
      fill: (r * 13 + c) % 6 < 4 ? 'rgba(63,187,239,.8)' : 'rgba(63,187,239,.2)' });

  // ================= HEX PANELS (donut column + bars + % + hexagon) =================
  function hexPanel(id, x, y, w, h, pct, hexR) {
    put(id, 'rect', { x, y, width: w, height: h, class: 'ln2 fillT', 'stroke-width': 1 });
    [.72, .45, .86].forEach((f, i) => {
      const cy = y + 30 + i * 36, C = 2 * Math.PI * 13;
      put(id, 'circle', { cx: x + 30, cy, r: 13, fill: 'none',
        stroke: 'rgba(63,187,239,.3)', 'stroke-width': 5 });
      put(id, 'circle', { cx: x + 30, cy, r: 13, fill: 'none', stroke: '#3FBBEF',
        'stroke-width': 5, 'stroke-dasharray': `${C * f} ${C}`,
        transform: `rotate(-90 ${x + 30} ${cy})` });
    });
    [56, 40, 48].forEach((len, i) =>
      put(id, 'line', { x1: x + 56, y1: y + 24 + i * 13, x2: x + 56 + len, y2: y + 24 + i * 13,
        stroke: i === 1 ? '#7FDCFB' : 'rgba(63,187,239,.6)', 'stroke-width': 4 }));
    put(id, 'text', { x: x + 58, y: y + 92, 'font-size': 20, fill: '#CFF2FF' }, pct);
    const hx = x + w - hexR - 26, hy = y + h / 2;
    let d = '';
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i + Math.PI / 6;
      d += (i ? 'L' : 'M') + (hx + hexR * Math.cos(a)) + ' ' + (hy + hexR * Math.sin(a)) + ' ';
    }
    put(id, 'path', { d: d + 'Z', fill: 'none', stroke: '#3FBBEF', 'stroke-width': 1.5 });
    put(id, 'circle', { cx: hx, cy: hy, r: hexR * .55, fill: 'none',
      stroke: 'rgba(63,187,239,.6)', 'stroke-width': 1 });
    put(id, 'line', { x1: hx - hexR * .8, y1: hy, x2: hx + hexR * .8, y2: hy,
      stroke: 'rgba(63,187,239,.5)', 'stroke-width': 1 });
    put(id, 'line', { x1: hx, y1: hy - hexR * .8, x2: hx, y2: hy + hexR * .8,
      stroke: 'rgba(63,187,239,.5)', 'stroke-width': 1 });
    put(id, 'circle', { cx: hx, cy: hy, r: 9, fill: '#CFF2FF' });
    put(id, 'text', { x: hx - 34, y: y + h - 12, 'font-size': 10,
      fill: 'rgba(150,215,245,.7)' }, '0.002157');
  }
  hexPanel('hexA', 400, 606, 260, 148, '75%', 42);
  hexPanel('hexB', 236, 872, 260, 118, '100%', 36);
  // ruler under hex panel A
  for (let i = 0; i < 15; i++)
    put('schemticks', 'line', { x1: 404 + i * 17, y1: 764, x2: 404 + i * 17, y2: 771,
      stroke: 'rgba(63,187,239,.5)', 'stroke-width': 1 });

  // ================= BOTTOM-LEFT SUITE =================
  // capsule bar columns (3 pill stacks, left edge)
  for (let c = 0; c < 3; c++) {
    const x = 40 + c * 24, filled = [7, 5, 8][c];
    for (let i = 0; i < 9; i++)
      put('capsules', 'rect', { x, y: 636 + i * 15, width: 13, height: 10, rx: 4,
        fill: i >= 9 - filled ? (i > 6 ? '#5FCBF6' : 'rgba(63,187,239,.55)')
                              : 'rgba(63,187,239,.12)' });
  }
  // dash matrix 3 x 16
  for (let r = 0; r < 3; r++) for (let c = 0; c < 16; c++)
    put('dashmatrix', 'rect', { x: 350 + c * 20, y: 786 + r * 15, width: 12, height: 7,
      fill: (r * 16 + c) % 5 < 3 ? 'rgba(63,187,239,.55)' : 'rgba(63,187,239,.15)' });
  // segmented bar + frame
  for (let i = 0; i < 14; i++)
    put('widebar', 'rect', { x: 244 + i * 22, y: 744, width: 15, height: 13,
      fill: i < 9 ? 'rgba(63,187,239,.7)' : 'rgba(63,187,239,.18)' });
  put('widebar', 'rect', { x: 240, y: 740, width: 316, height: 21, fill: 'none',
    stroke: 'rgba(63,187,239,.45)', 'stroke-width': 1 });
  // dot row + slash row
  for (let i = 0; i < 12; i++)
    put('dotrow', 'circle', { cx: 250 + i * 18, cy: 776, r: 3.5,
      fill: i % 4 ? 'rgba(63,187,239,.4)' : '#5FCBF6' });
  for (let i = 0; i < 14; i++)
    put('slashrow', 'line', { x1: 250 + i * 14, y1: 850, x2: 242 + i * 14, y2: 862,
      stroke: i % 5 === 0 ? '#7FDCFB' : 'rgba(63,187,239,.5)', 'stroke-width': 2 });
  // film strip
  for (let i = 0; i < 6; i++)
    put('filmstrip', 'rect', { x: 20, y: 856 + i * 20, width: 8, height: 12,
      fill: 'rgba(63,187,239,.4)' });
  // stacked dash columns
  const stacks = [12, 7, 15, 9, 13];
  stacks.forEach((n, c) => {
    for (let i = 0; i < n; i++)
      put('stacks', 'rect', { x: 516 + c * 17, y: 986 - i * 7, width: 11, height: 4,
        fill: i % 4 === 3 ? '#5FCBF6' : 'rgba(63,187,239,.5)' });
  });

  // ================= TOP BANNER hatches, stripes, TR dots =================
  for (let i = 0; i < 20; i++)
    put('hatchA', 'line', { x1: 470 + i * 12, y1: 88, x2: 462 + i * 12, y2: 130,
      stroke: i % 5 === 0 ? '#7FDCFB' : 'rgba(63,187,239,.45)', 'stroke-width': 2 });
  for (let i = 0; i < 16; i++)
    put('hatchB', 'line', { x1: 816 + i * 12, y1: 88, x2: 808 + i * 12, y2: 130,
      stroke: i % 5 === 0 ? '#7FDCFB' : 'rgba(63,187,239,.45)', 'stroke-width': 2 });
  for (let i = 0; i < 9; i++)
    put('stripes', 'line', { x1: 1282 + i * 16, y1: 84, x2: 1266 + i * 16, y2: 128,
      stroke: i % 2 ? '#5FCBF6' : 'rgba(63,187,239,.35)', 'stroke-width': 5 });
  for (let r = 0; r < 6; r++) for (let c = 0; c < 3; c++)
    put('dotcolTR', 'rect', { x: 1120 + c * 12, y: 130 + r * 12, width: 5, height: 5,
      fill: (r + c) % 3 ? 'rgba(63,187,239,.25)' : 'rgba(63,187,239,.8)' });

  // ---- compass ticks + gear ring + right edge dots ----
  for (let i = 0; i < 36; i++) {
    const a = i / 36 * 2 * Math.PI;
    const [x1, y1] = P(1214, 369, i % 9 === 0 ? 40 : 45, a);
    const [x2, y2] = P(1214, 369, 51, a);
    put('compassticks', 'line', { x1, y1, x2, y2, stroke: '#3FBBEF',
      'stroke-width': 1, opacity: i % 9 === 0 ? .9 : .4 });
  }
  for (let i = 0; i < 10; i++) {
    const a0 = i / 10 * 360, a1 = a0 + 26;
    const [x0, y0] = P(1362, 377, 34, a0 * Math.PI / 180);
    const [x1, y1] = P(1362, 377, 34, a1 * Math.PI / 180);
    put('gearring', 'path', { d: `M ${x0} ${y0} A 34 34 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 2 ? '#5FCBF6' : 'rgba(63,187,239,.4)', 'stroke-width': 10 });
  }
  for (let r = 0; r < 5; r++)
    put('edgeDotsR', 'rect', { x: 1494, y: 580 + r * 12, width: 6, height: 6,
      fill: r % 2 ? 'rgba(63,187,239,.3)' : 'rgba(63,187,239,.8)' });

  // ================= TURBINE GAUGE =================
  // 8 fan blades, two gaps (like the art's broken ring)
  for (let i = 0; i < 8; i++) {
    if (i === 2 || i === 5) continue;
    const a0 = i * 45 + 4, a1 = a0 + 34;
    const r0 = 188, r1 = 132;
    const p0 = P(1010, 885, r0, a0 * Math.PI / 180), p1 = P(1010, 885, r0, a1 * Math.PI / 180);
    const p2 = P(1010, 885, r1, (a1 - 4) * Math.PI / 180), p3 = P(1010, 885, r1, (a0 + 4) * Math.PI / 180);
    put('turbblades', 'path', {
      d: `M ${p0[0]} ${p0[1]} A ${r0} ${r0} 0 0 1 ${p1[0]} ${p1[1]} L ${p2[0]} ${p2[1]} A ${r1} ${r1} 0 0 0 ${p3[0]} ${p3[1]} Z`,
      fill: 'rgba(90,190,245,.28)', stroke: '#4FC7F2', 'stroke-width': 1 });
  }
  for (let i = 0; i < 48; i++) {
    const a = i / 48 * 2 * Math.PI;
    const [x1, y1] = P(1010, 885, 96, a);
    const [x2, y2] = P(1010, 885, i % 4 === 0 ? 78 : 86, a);
    put('turbticks', 'line', { x1, y1, x2, y2, stroke: '#3FBBEF',
      'stroke-width': 1, opacity: i % 4 === 0 ? .8 : .4 });
  }
  // ---- ring row on the floor ----
  const ringDefs = [[622, 938, 13, .8], [668, 934, 17, .55], [720, 930, 15, .7],
                    [772, 928, 19, .45], [826, 930, 14, .85]];
  ringDefs.forEach(([cx, cy, r, f]) => {
    const C = 2 * Math.PI * r;
    put('ringrow', 'circle', { cx, cy, r, fill: 'none',
      stroke: 'rgba(63,187,239,.3)', 'stroke-width': 5 });
    put('ringrow', 'circle', { cx, cy, r, fill: 'none', stroke: '#4FC7F2',
      'stroke-width': 5, 'stroke-dasharray': `${C * f} ${C}`,
      transform: `rotate(${cx % 360} ${cx} ${cy})` });
    put('ringrow', 'circle', { cx, cy, r: 3, fill: '#CFF2FF' });
  });
  // ---- spectrum bars on the floor ----
  const spec = [8, 18, 12, 30, 22, 44, 30, 52, 38, 26, 46, 20, 34, 14, 24, 10];
  spec.forEach((h, i) => put('spectrum', 'rect',
    { x: 1216 + i * 9, y: 856 - h, width: 5, height: h,
      fill: i % 4 === 1 ? '#5FCBF6' : 'rgba(63,187,239,.55)' }));

  // ---- BR loader segments ----
  for (let i = 0; i < 12; i++) {
    const a0 = i / 12 * 360 + 3, a1 = a0 + 24;
    const [x0, y0] = P(1143, 862, 52, a0 * Math.PI / 180);
    const [x1, y1] = P(1143, 862, 52, a1 * Math.PI / 180);
    put('loaderseg', 'path', { d: `M ${x0} ${y0} A 52 52 0 0 1 ${x1} ${y1}`,
      fill: 'none', stroke: i % 3 === 2 ? 'rgba(63,187,239,.3)' : '#3FBBEF', 'stroke-width': 8 });
  }
  // ---- ruler ----
  for (let i = 0; i < 16; i++)
    put('ruler', 'line', { x1: 1252 + i * 14, y1: 878, x2: 1252 + i * 14,
      y2: i % 4 === 0 ? 890 : 886, stroke: 'rgba(63,187,239,.55)', 'stroke-width': 1 });
  // ---- pagination dots ----
  for (let i = 0; i < 7; i++)
    put('pagedots', 'circle', { cx: 716 + i * 18, cy: 985, r: i === 2 ? 5 : 3.5,
      fill: i === 2 ? '#CFF2FF' : 'rgba(63,187,239,.45)' });
  // ---- below-banner dot row ----
  for (let i = 0; i < 12; i++)
    put('bannerDots', 'circle', { cx: 450 + i * 16, cy: 214, r: 3,
      fill: i % 4 ? 'rgba(63,187,239,.35)' : '#5FCBF6' });
  // ---- upper-left edge dot column ----
  for (let r = 0; r < 9; r++) for (let c = 0; c < 2; c++)
    put('edgeDotsL', 'rect', { x: 20 + c * 11, y: 268 + r * 13, width: 5, height: 5,
      fill: (r + c) % 3 ? 'rgba(63,187,239,.3)' : 'rgba(63,187,239,.8)' });
</script>
