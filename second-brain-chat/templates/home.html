<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CLARVIS — Home</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CLARVIS">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #0f1520;
    --panel-2: #121a28;
    --line: #1c2534;
    --text: #e7ecf5;
    --text-dim: #6b7688;
    --accent: #3fd0ff;
    --accent-dim: #1a4a5c;
    --good: #52e0a0;
    --warn: #ffb84d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(10,14,20,0.92);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px;
    font-family: "SF Mono", "Courier New", monospace; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
    animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  nav { display: flex; align-items: center; gap: 4px; }
  nav a { color: var(--text-dim); text-decoration: none; font-size: 13px;
    padding: 6px 12px; border-radius: 6px; border: 1px solid transparent; }
  nav a:hover { color: var(--text); border-color: var(--line); }
  nav a.active { color: var(--accent); border-color: var(--accent-dim); }
  .refreshed { font-size: 11px; color: var(--text-dim); font-family: "SF Mono", monospace; }

  main { max-width: 1200px; margin: 0 auto; padding: 20px 16px 60px; }

  /* Quick actions */
  .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
  .action {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 10px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    font-size: 14px; text-decoration: none; transition: border-color .15s, transform .05s;
  }
  .action:hover { border-color: var(--accent-dim); }
  .action:active { transform: translateY(1px); }
  .action.primary { background: linear-gradient(180deg, #14344a, #0f2536); border-color: var(--accent-dim); color: var(--accent); }
  .action .ico { font-size: 15px; }

  /* Grid of panels */
  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    align-items: start;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 16px 8px;
    min-width: 0;
  }
  .panel h2 {
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); margin: 0 0 12px; display: flex; align-items: center; gap: 8px;
    font-family: "SF Mono", "Courier New", monospace;
  }
  .panel h2 .count {
    margin-left: auto; font-size: 11px; color: var(--accent);
    background: var(--accent-dim); border-radius: 20px; padding: 1px 8px;
  }
  .row {
    padding: 10px 0; border-top: 1px solid var(--line);
  }
  .row:first-of-type { border-top: none; }
  .row .r-title { font-size: 14px; color: var(--text); line-height: 1.35; word-wrap: break-word; }
  .row .r-sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; word-wrap: break-word; }
  .row .r-meta { font-size: 11px; color: var(--text-dim); font-family: "SF Mono", monospace; }
  .row a.r-title, .row .r-title a { color: var(--accent); text-decoration: none; }
  .row a:hover { text-decoration: underline; }
  .pill {
    display: inline-block; font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
    padding: 1px 7px; border-radius: 20px; border: 1px solid var(--line); color: var(--text-dim);
    font-family: "SF Mono", monospace; margin-right: 6px;
  }
  .pill.feasibility { color: var(--warn); border-color: #4a3a1a; }
  .pill.deliberation { color: var(--accent); border-color: var(--accent-dim); }
  .status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:7px; vertical-align: middle; }

  .empty { color: var(--text-dim); font-size: 13px; padding: 6px 0 14px; line-height: 1.5; }
  .empty .hint { display:block; font-size: 12px; margin-top: 4px; color: #55606f; }

  .loading { color: var(--text-dim); font-size: 13px; padding: 10px 0; }

  /* Task statuses */
  .st-idea { background: #3a4250; }
  .st-evaluating { background: var(--warn); }
  .st-approved { background: var(--accent); }
  .st-in_progress { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .st-done { background: var(--good); }
  .st-dropped { background: #4a3540; }

  /* Draft run status dots */
  .draft-draft { background: var(--warn); }
  .draft-approved { background: var(--accent); }
  .draft-launched { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .draft-completed { background: var(--good); }

  /* Goal progress bar */
  .progress { height: 6px; background: var(--line); border-radius: 20px; margin: 7px 0 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 20px; transition: width .3s; }

  /* Draft action buttons */
  .draft-actions { margin-top: 6px; }
  .mini-btn { background: transparent; border: 1px solid var(--accent-dim); color: var(--accent);
    border-radius: 6px; padding: 3px 10px; font-size: 12px; cursor: pointer; }
  .mini-btn:hover { background: var(--accent-dim); }

  @media (max-width: 560px) {
    main { padding: 14px 10px 50px; }
    .grid { grid-template-columns: 1fr; }
    .action { flex: 1 1 44%; justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <div class="brand"><div class="pulse"></div><span>CLARVIS</span></div>
  <nav>
    <a href="/">Chat</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/memory">Memory</a>
    <a href="/hud">HUD</a>
  </nav>
</header>

<main>
  <div class="actions">
    <a class="action primary" href="/"><span class="ico">&#128172;</span> Open Chat</a>
    <a class="action" href="/?q=Synthesize%20a%20report%20on%3A%20"><span class="ico">&#128220;</span> Run Synthesizer</a>
    <a class="action" href="/?q=Build%20a%20website%3A%20"><span class="ico">&#127760;</span> Build Website</a>
    <a class="action" href="/?q=Create%20a%20task%3A%20"><span class="ico">&#9989;</span> New Task</a>
    <a class="action" href="/?q=weekly%20review"><span class="ico">&#128202;</span> Weekly Review</a>
    <button class="action" id="refresh-btn"><span class="ico">&#8635;</span> Refresh</button>
  </div>

  <div class="grid" id="grid">
    <div class="loading">Loading your command deck…</div>
  </div>

  <div class="refreshed" id="refreshed" style="margin-top:18px"></div>
</main>

<script>
  const grid = document.getElementById('grid');
  const refreshedEl = document.getElementById('refreshed');

  function esc(s) {
    return (s == null ? '' : String(s))
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
  function when(w) { return w ? esc(w) : ''; }

  function panel(title, count, rowsHtml, emptyMsg, emptyHint) {
    const badge = count > 0 ? `<span class="count">${count}</span>` : '';
    const body = (rowsHtml && rowsHtml.trim())
      ? rowsHtml
      : `<div class="empty">${esc(emptyMsg)}${emptyHint ? `<span class="hint">${esc(emptyHint)}</span>` : ''}</div>`;
    return `<div class="panel"><h2>${esc(title)}${badge}</h2>${body}</div>`;
  }

  function rows(items, fn) { return items.map(fn).join(''); }

  function render(d) {
    const panels = [];

    // Tasks
    // Intake triage — what arrived in Alex's world (texts/email/calendar/pastes),
    // with extracted obligations. One tap: Accept → tasks, or Dismiss. FIRST panel
    // on purpose: this is where "Jarvis is the organized one" lives.
    {
      const ik = d.intake || {counts:{}, recent:[]};
      const cnew = (ik.counts||{}).new || 0;
      const summary = `${cnew} waiting · ${ik.arrived_today||0} arrived today`;
      const srcIcon = {imessage:'💬', gmail:'✉️', calendar:'📅', inbox:'📥'};
      const body = `<div class="r-meta" style="padding:2px 0 6px">${esc(summary)}</div>` +
        rows((ik.recent||[]).filter(r => r.status==='new'), r => {
          const items = (r.items||[]).map(i =>
            `<div class="r-sub">• <span class="pill">${esc(i.type)}</span> ${esc(i.text)}${i.due ? ` <b>(due ${esc(i.due)})</b>` : ''}</div>`).join('');
          return `
        <div class="row">
          <div class="r-title">${srcIcon[r.source]||'•'} ${esc(r.sender||r.source)}</div>
          ${items}
          <div class="intake-actions" data-id="${r.id}">
            <button class="mini-btn" data-act="accept">Accept → tasks</button>
            <button class="mini-btn" data-act="dismiss">Dismiss</button>
          </div>
          <div class="r-meta">#${r.id} · ${esc(r.source)} · ${when(r.ts)}</div>
        </div>`;
        });
      panels.push(panel('Intake — needs your triage', cnew, body,
        'Nothing waiting — intake is clear.', 'New texts, emails, and calendar changes land here with their obligations extracted. Paste anything in chat with "capture this" to file it.'));
    }

    panels.push(panel('Tasks', (d.tasks||[]).length,
      rows(d.tasks||[], t => `
        <div class="row">
          <div class="r-title"><span class="status-dot st-${esc(t.status)}"></span>${esc(t.title)}</div>
          <div class="r-sub">${esc((t.status||'').replace('_',' '))}${t.updated_human ? ' · ' + esc(t.updated_human) : ''}</div>
        </div>`),
      'No tasks yet.', 'Say "create a task: …" in chat, or use New Task above.'));

    // Goals (with progress bars)
    panels.push(panel('Goals', (d.goals||[]).length,
      rows(d.goals||[], g => {
        const pct = g.progress_pct || 0;
        const td = g.target_date ? ` · target ${esc(g.target_date)}` : '';
        return `
        <div class="row">
          <div class="r-title">${esc(g.title)} <span class="pill">${esc(g.status)}</span></div>
          <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="r-meta">${pct}% · ${g.done_tasks}/${g.total_tasks} tasks${td}</div>
        </div>`;
      }),
      'No goals yet.', 'Say "my goal is to…" in chat to start tracking one.'));

    // Drafted runs (overnight-build prompts awaiting your review)
    panels.push(panel('Drafted Runs', (d.drafts||[]).length,
      rows(d.drafts||[], r => `
        <div class="row">
          <div class="r-title"><span class="status-dot draft-${esc(r.status)}"></span>${esc(r.title)}</div>
          <div class="r-sub">${esc(r.status)}${r.has_verdict ? ' · council ✓' : ''} · <a href="/api/drafts/${r.id}?raw=1" target="_blank" rel="noopener">view full &#8599;</a></div>
          <div class="draft-actions" data-id="${r.id}">
            ${r.status==='draft' ? `<button class="mini-btn" data-status="approved">Approve</button>` : ''}
            ${r.status==='approved' ? `<button class="mini-btn" data-status="launched">Mark launched</button>` : ''}
            ${r.status==='launched' ? `<button class="mini-btn" data-status="completed">Mark completed</button>` : ''}
          </div>
          <div class="r-meta">${when(r.when)}</div>
        </div>`),
      'No drafted runs.', 'Ask "draft a run to…" — I write the prompt; you launch it with jarvis-launch.sh.'));

    // Council decisions
    panels.push(panel('Council Decisions', (d.council||[]).length,
      rows(d.council||[], c => `
        <div class="row">
          <div class="r-title"><span class="pill ${esc(c.kind)}">${c.kind==='feasibility'?'feasibility':'council'}</span>${esc(c.idea)}</div>
          ${c.headline ? `<div class="r-sub">${esc(c.headline)}</div>` : ''}
          <div class="r-meta">${when(c.when)}</div>
        </div>`),
      'No council runs yet.', 'Ask "run this through the council" or "is this feasible: …".'));

    // Expansion pipeline (Scout → Council → Applicator)
    {
      const ex = d.expansion || {counts:{}, recent:[]};
      const counts = ex.counts || {};
      const order = ['found','under_review','approved','installed','deferred','rejected','failed'];
      const summary = order.filter(s => counts[s]).map(s => `${counts[s]} ${s.replace('_',' ')}`).join(' · ');
      const total = Object.values(counts).reduce((a,b) => a+b, 0);
      const body = (summary ? `<div class="r-meta" style="padding:2px 0 6px">${esc(summary)}</div>` : '') +
        rows(ex.recent||[], f => {
          const dec = f.decision ? ` <span class="pill">${esc(f.decision)}</span>` : '';
          const risk = (f.security_risk!=null) ? ` · risk ${esc(String(f.security_risk))}/5` : '';
          return `
        <div class="row">
          <div class="r-title"><span class="status-dot st-${esc(f.status)}"></span>${f.url ? `<a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.name||f.url)}</a>` : esc(f.name||'(unnamed)')}${dec}</div>
          <div class="r-sub">${esc(f.what||'')}</div>
          <div class="r-meta">#${f.id} · ${esc(f.source||'?')} · ${esc((f.status||'').replace('_',' '))}${risk}</div>
        </div>`;
        });
      panels.push(panel('Expansion Pipeline', total, body,
        'No findings yet.', 'Say "run the scouts" to discover tools; then "review findings" and "apply finding N".'));
    }

    // Money pipeline (Scouts → Council → Planner)
    {
      const mo = d.money || {counts:{}, recent:[]};
      const counts = mo.counts || {};
      const order = ['found','under_review','pursue','planned','deferred','rejected'];
      const summary = order.filter(s => counts[s]).map(s => `${counts[s]} ${s.replace('_',' ')}`).join(' · ');
      const total = Object.values(counts).reduce((a,b) => a+b, 0);
      const body = (summary ? `<div class="r-meta" style="padding:2px 0 6px">${esc(summary)}</div>` : '') +
        rows(mo.recent||[], f => {
          const dec = f.decision ? ` <span class="pill">${esc(f.decision)}</span>` : '';
          const econ = (f.profit!=null && f.cost!=null) ? ` · ~$${esc(String(f.profit))} vs $${esc(String(f.cost))}/mo` : '';
          const axes = (f.plausibility!=null) ? ` · plaus ${esc(String(f.plausibility))}/5 · auto ${esc(String(f.autonomy))}/5` : '';
          return `
        <div class="row">
          <div class="r-title"><span class="status-dot st-${esc(f.status)}"></span>${f.url ? `<a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.name||f.url)}</a>` : esc(f.name||'(unnamed)')}${dec}</div>
          <div class="r-sub">${esc(f.method||'')}</div>
          <div class="r-meta">#${f.id} · ${esc(f.source||'?')} · ${esc((f.status||'').replace('_',' '))}${axes}${econ}</div>
        </div>`;
        });
      panels.push(panel('Money Pipeline', total, body,
        'No ideas yet.', 'Say "run the money scouts" to hunt income ideas; then "review money ideas" and "develop idea N".'));
    }

    // Agent outputs
    panels.push(panel('Recent Agent Activity', (d.agent_outputs||[]).length,
      rows(d.agent_outputs||[], a => `
        <div class="row">
          <div class="r-title">${esc(a.agent)}</div>
          ${a.summary ? `<div class="r-sub">${esc(a.summary)}</div>` : ''}
          <div class="r-meta">${when(a.when)}</div>
        </div>`),
      'No agent outputs yet.', 'Your agents log results here as they run.'));

    // Vault notes
    panels.push(panel('Recent Vault Notes', (d.vault_notes||[]).length,
      rows(d.vault_notes||[], n => `
        <div class="row">
          <div class="r-title">${esc(n.title)}</div>
          <div class="r-sub">${esc(n.preview)}</div>
          <div class="r-meta">${esc(n.folder)}${n.when ? ' · ' + esc(n.when) : ''}</div>
        </div>`),
      'No notes indexed.', 'Point OBSIDIAN_VAULT_PATH at your vault (or sample_vault to demo).'));

    // Captured notes staged in vault_inbox/ (drag into Obsidian)
    panels.push(panel('Captured Notes', (d.captured||[]).length,
      rows(d.captured||[], c => `
        <div class="row">
          <div class="r-title">${esc(c.title)}</div>
          ${c.summary ? `<div class="r-sub">${esc(c.summary)}</div>` : ''}
          <div class="r-meta">→ ${esc(c.folder||'?')}${c.tags ? ' · ' + esc(c.tags) : ''} · <span style="font-family:'SF Mono',monospace">${esc(c.filename)}</span></div>
        </div>`),
      'No captured notes waiting.', 'Ask CLARVIS to "capture this as a note" — it stages a file in vault_inbox/ to drag into Obsidian.'));

    // System health indicator
    if (d.health && d.health.checks) {
      const dot = {healthy:'🟢', degraded:'🟡', critical:'🔴'}[d.health.overall] || '⚪';
      panels.push(panel('System Health ' + dot + ' ' + esc((d.health.overall||'').toUpperCase()),
        (d.health.checks||[]).length,
        rows(d.health.checks||[], c => {
          const mark = c.ok===true ? '✓' : (c.ok===false ? '✗' : '•');
          const col = c.ok===true ? '#39d98a' : (c.ok===false ? '#ff6b6b' : '#e2b93b');
          return `<div class="row">
            <div class="r-title"><span style="color:${col}">${mark}</span> ${esc(c.name)}: ${esc(c.status)}</div>
            ${c.detail ? `<div class="r-meta">${esc(c.detail)}</div>` : ''}
          </div>`;
        }), 'No checks.', ''));
    }

    // Cost tracking
    if (d.cost && d.cost.today) {
      const t = d.cost.today, w = d.cost.week;
      const feats = (d.cost.by_feature||[]).slice(0,6);
      const featRows = feats.map(f => `<div class="row"><div class="r-title">${esc(f.feature)}</div>
        <div class="r-meta">$${(f.cost||0).toFixed(4)} · ${f.requests} req</div></div>`).join('');
      const body = `<div class="row"><div class="r-title">Today: $${(t.cost||0).toFixed(4)}</div>
          <div class="r-meta">${t.requests} req · ${(t.input_tokens||0).toLocaleString()} in / ${(t.output_tokens||0).toLocaleString()} out</div></div>
        <div class="row"><div class="r-title">This week: $${(w.cost||0).toFixed(4)}</div>
          <div class="r-meta">${w.requests} req · estimated from pricing.json (verify)</div></div>
        ${featRows}`;
      panels.push(`<div class="panel"><h2>API Cost</h2>${(t.requests||w.requests) ? body :
        `<div class="empty">No API usage recorded yet.<div class="hint">Chat with CLARVIS and spend shows up here.</div></div>`}</div>`);
    }

    // Monitoring Agent: budget tier + worker status + recent incidents
    if (d.monitor) {
      const m = d.monitor;
      const b = m.budget || {};
      const tierColor = {ok:'#39d98a', warn:'#e2b93b', throttle:'#ff9f43', shutdown:'#ff6b6b'}[b.tier] || '#6b7688';
      const workers = Object.entries(m.worker_status || {});
      const workerRows = workers.map(([name, alive]) => `
        <div class="row"><div class="r-title">
          <span style="color:${alive ? '#39d98a' : '#ff6b6b'}">${alive ? '✓' : '✗'}</span> ${esc(name)}
        </div></div>`).join('');
      const eventRows = (m.recent_events || []).slice(0, 6).map(e => `
        <div class="row"><div class="r-title">${esc((e.level||'').toUpperCase())} · ${esc(e.component||'?')}</div>
          <div class="r-sub">${esc(e.message||'')}</div></div>`).join('');
      const body = `
        <div class="row"><div class="r-title">Budget: <span style="color:${tierColor}">${esc((b.tier||'ok').toUpperCase())}</span></div>
          <div class="r-meta">$${(b.spend||0).toFixed(2)} / $${(b.budget||0).toFixed(2)} this month (${((b.pct||0)*100).toFixed(0)}%)</div></div>
        ${workerRows}
        ${eventRows}`;
      panels.push(`<div class="panel"><h2>Budget &amp; Incidents ${m.incident_count ? `<span class="count">${m.incident_count}</span>` : ''}</h2>${body}</div>`);
    }

    // Recent activity (tool audit log)
    panels.push(panel('Recent Activity', (d.activity||[]).length,
      rows(d.activity||[], a => {
        const ok = a.success ? '<span style="color:#39d98a">✓</span>' : '<span style="color:#ff6b6b">✗</span>';
        const t = (a.ts||'').replace('T',' ').slice(11,16);
        return `<div class="row">
          <div class="r-title">${ok} ${esc(a.tool)} <span style="opacity:.6">via ${esc(a.trigger)}</span></div>
          ${a.input_summary ? `<div class="r-sub">${esc(a.input_summary)}</div>` : ''}
          <div class="r-meta">${esc(t)}${a.ms ? ' · ' + a.ms + 'ms' : ''}</div>
        </div>`;
      }),
      'No tool activity logged yet.', 'Every tool CLARVIS runs is recorded here.'));

    // Synthesized reports
    panels.push(panel('Synthesized Reports', (d.reports||[]).length,
      rows(d.reports||[], r => `
        <div class="row">
          <div class="r-title">${esc(r.title)}</div>
          <div class="r-meta">${esc(r.file)}${r.when ? ' · ' + esc(r.when) : ''}</div>
        </div>`),
      'No reports yet.', 'Use Run Synthesizer above to research a topic.'));

    // Built sites
    panels.push(panel('Built Sites', (d.sites||[]).length,
      rows(d.sites||[], s => `
        <div class="row">
          <div class="r-title"><a href="${esc(s.preview_url)}" target="_blank" rel="noopener">${esc(s.name)} &#8599;</a></div>
          <div class="r-sub">${s.pages} page${s.pages===1?'':'s'} · <span style="font-family:'SF Mono',monospace">${esc(s.slug)}</span></div>
          <div class="r-meta">${when(s.when)}</div>
        </div>`),
      'No sites built yet.', 'Use Build Website above to generate one.'));

    // Recent conversations (long-term memory)
    panels.push(panel('Recent Conversations', (d.memory||[]).length,
      rows(d.memory||[], m => `
        <div class="row">
          <div class="r-title"><a href="/memory">${esc(m.title)}</a></div>
          ${m.summary ? `<div class="r-sub">${esc(m.summary)}</div>` : ''}
          <div class="r-meta">${m.message_count} msg${m.when ? ' · ' + esc(m.when) : ''}</div>
        </div>`),
      'No conversations remembered yet.', 'Everything you and CLARVIS discuss is saved to Memory.'));

    grid.innerHTML = panels.join('');
    refreshedEl.textContent = d.generated_at ? ('Updated ' + d.generated_at) : '';
  }

  async function load() {
    try {
      const res = await fetch('/api/home');
      if (res.status === 401) { location.href = '/login'; return; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      render(await res.json());
    } catch (e) {
      grid.innerHTML = `<div class="panel"><h2>Couldn't load</h2>
        <div class="empty">The dashboard couldn't reach the server (${esc(e.message)}).
        <span class="hint">It will retry automatically. Check that the app is running.</span></div></div>`;
    }
  }

  // Draft status controls (approve / mark launched / mark completed). Setting a status
  // is bookkeeping only — it never launches anything.
  grid.addEventListener('click', async (e) => {
    const btn = e.target.closest('.draft-actions button');
    if (!btn) return;
    const id = btn.closest('.draft-actions').dataset.id;
    const status = btn.dataset.status;
    btn.disabled = true; btn.textContent = '…';
    try {
      await fetch(`/api/drafts/${id}/status`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      load();
    } catch (err) { btn.disabled = false; }
  });

  // Intake triage controls: accept (items → tasks) / dismiss. Read-only at the
  // source — accepting only writes into OUR task tracker.
  grid.addEventListener('click', async (e) => {
    const btn = e.target.closest('.intake-actions button');
    if (!btn) return;
    const id = parseInt(btn.closest('.intake-actions').dataset.id, 10);
    const action = btn.dataset.act;
    btn.disabled = true; btn.textContent = '…';
    try {
      await fetch('/api/intake/act', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, action }),
      });
      load();
    } catch (err) { btn.disabled = false; }
  });

  document.getElementById('refresh-btn').addEventListener('click', load);
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
