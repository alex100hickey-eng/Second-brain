<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Second Brain — Home</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<meta name="theme-color" content="#0a0e14">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #0f1520;
    --panel-2: #121a28;
    --line: #1c2534;
    --text: #e7ecf5;
    --text-dim: #6b7688;
    --accent: #3fd0ff;
    --accent-dim: #1a4a5c;
    --good: #52e0a0;
    --warn: #ffb84d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(10,14,20,0.92);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 10px;
    font-family: "SF Mono", "Courier New", monospace; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
    animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  nav { display: flex; align-items: center; gap: 4px; }
  nav a { color: var(--text-dim); text-decoration: none; font-size: 13px;
    padding: 6px 12px; border-radius: 6px; border: 1px solid transparent; }
  nav a:hover { color: var(--text); border-color: var(--line); }
  nav a.active { color: var(--accent); border-color: var(--accent-dim); }
  .refreshed { font-size: 11px; color: var(--text-dim); font-family: "SF Mono", monospace; }

  main { max-width: 1200px; margin: 0 auto; padding: 20px 16px 60px; }

  /* Quick actions */
  .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
  .action {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 10px; cursor: pointer;
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    font-size: 14px; text-decoration: none; transition: border-color .15s, transform .05s;
  }
  .action:hover { border-color: var(--accent-dim); }
  .action:active { transform: translateY(1px); }
  .action.primary { background: linear-gradient(180deg, #14344a, #0f2536); border-color: var(--accent-dim); color: var(--accent); }
  .action .ico { font-size: 15px; }

  /* Grid of panels */
  .grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    align-items: start;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 16px 8px;
    min-width: 0;
  }
  .panel h2 {
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); margin: 0 0 12px; display: flex; align-items: center; gap: 8px;
    font-family: "SF Mono", "Courier New", monospace;
  }
  .panel h2 .count {
    margin-left: auto; font-size: 11px; color: var(--accent);
    background: var(--accent-dim); border-radius: 20px; padding: 1px 8px;
  }
  .row {
    padding: 10px 0; border-top: 1px solid var(--line);
  }
  .row:first-of-type { border-top: none; }
  .row .r-title { font-size: 14px; color: var(--text); line-height: 1.35; word-wrap: break-word; }
  .row .r-sub { font-size: 12px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; word-wrap: break-word; }
  .row .r-meta { font-size: 11px; color: var(--text-dim); font-family: "SF Mono", monospace; }
  .row a.r-title, .row .r-title a { color: var(--accent); text-decoration: none; }
  .row a:hover { text-decoration: underline; }
  .pill {
    display: inline-block; font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
    padding: 1px 7px; border-radius: 20px; border: 1px solid var(--line); color: var(--text-dim);
    font-family: "SF Mono", monospace; margin-right: 6px;
  }
  .pill.feasibility { color: var(--warn); border-color: #4a3a1a; }
  .pill.deliberation { color: var(--accent); border-color: var(--accent-dim); }
  .status-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:7px; vertical-align: middle; }

  .empty { color: var(--text-dim); font-size: 13px; padding: 6px 0 14px; line-height: 1.5; }
  .empty .hint { display:block; font-size: 12px; margin-top: 4px; color: #55606f; }

  .loading { color: var(--text-dim); font-size: 13px; padding: 10px 0; }

  /* Task statuses */
  .st-idea { background: #3a4250; }
  .st-evaluating { background: var(--warn); }
  .st-approved { background: var(--accent); }
  .st-in_progress { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .st-done { background: var(--good); }
  .st-dropped { background: #4a3540; }

  @media (max-width: 560px) {
    main { padding: 14px 10px 50px; }
    .grid { grid-template-columns: 1fr; }
    .action { flex: 1 1 44%; justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <div class="brand"><div class="pulse"></div><span>Second Brain</span></div>
  <nav>
    <a href="/">Chat</a>
    <a href="/dashboard" class="active">Dashboard</a>
    <a href="/hud">HUD</a>
  </nav>
</header>

<main>
  <div class="actions">
    <a class="action primary" href="/"><span class="ico">&#128172;</span> Open Chat</a>
    <a class="action" href="/?q=Synthesize%20a%20report%20on%3A%20"><span class="ico">&#128220;</span> Run Synthesizer</a>
    <a class="action" href="/?q=Build%20a%20website%3A%20"><span class="ico">&#127760;</span> Build Website</a>
    <a class="action" href="/?q=Create%20a%20task%3A%20"><span class="ico">&#9989;</span> New Task</a>
    <button class="action" id="refresh-btn"><span class="ico">&#8635;</span> Refresh</button>
  </div>

  <div class="grid" id="grid">
    <div class="loading">Loading your command deck…</div>
  </div>

  <div class="refreshed" id="refreshed" style="margin-top:18px"></div>
</main>

<script>
  const grid = document.getElementById('grid');
  const refreshedEl = document.getElementById('refreshed');

  function esc(s) {
    return (s == null ? '' : String(s))
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
  function when(w) { return w ? esc(w) : ''; }

  function panel(title, count, rowsHtml, emptyMsg, emptyHint) {
    const badge = count > 0 ? `<span class="count">${count}</span>` : '';
    const body = (rowsHtml && rowsHtml.trim())
      ? rowsHtml
      : `<div class="empty">${esc(emptyMsg)}${emptyHint ? `<span class="hint">${esc(emptyHint)}</span>` : ''}</div>`;
    return `<div class="panel"><h2>${esc(title)}${badge}</h2>${body}</div>`;
  }

  function rows(items, fn) { return items.map(fn).join(''); }

  function render(d) {
    const panels = [];

    // Tasks
    panels.push(panel('Tasks', (d.tasks||[]).length,
      rows(d.tasks||[], t => `
        <div class="row">
          <div class="r-title"><span class="status-dot st-${esc(t.status)}"></span>${esc(t.title)}</div>
          <div class="r-sub">${esc((t.status||'').replace('_',' '))}${t.updated_human ? ' · ' + esc(t.updated_human) : ''}</div>
        </div>`),
      'No tasks yet.', 'Say "create a task: …" in chat, or use New Task above.'));

    // Council decisions
    panels.push(panel('Council Decisions', (d.council||[]).length,
      rows(d.council||[], c => `
        <div class="row">
          <div class="r-title"><span class="pill ${esc(c.kind)}">${c.kind==='feasibility'?'feasibility':'council'}</span>${esc(c.idea)}</div>
          ${c.headline ? `<div class="r-sub">${esc(c.headline)}</div>` : ''}
          <div class="r-meta">${when(c.when)}</div>
        </div>`),
      'No council runs yet.', 'Ask "run this through the council" or "is this feasible: …".'));

    // Agent outputs
    panels.push(panel('Recent Agent Activity', (d.agent_outputs||[]).length,
      rows(d.agent_outputs||[], a => `
        <div class="row">
          <div class="r-title">${esc(a.agent)}</div>
          ${a.summary ? `<div class="r-sub">${esc(a.summary)}</div>` : ''}
          <div class="r-meta">${when(a.when)}</div>
        </div>`),
      'No agent outputs yet.', 'Your agents log results here as they run.'));

    // Vault notes
    panels.push(panel('Recent Vault Notes', (d.vault_notes||[]).length,
      rows(d.vault_notes||[], n => `
        <div class="row">
          <div class="r-title">${esc(n.title)}</div>
          <div class="r-sub">${esc(n.preview)}</div>
          <div class="r-meta">${esc(n.folder)}${n.when ? ' · ' + esc(n.when) : ''}</div>
        </div>`),
      'No notes indexed.', 'Point OBSIDIAN_VAULT_PATH at your vault (or sample_vault to demo).'));

    // Synthesized reports
    panels.push(panel('Synthesized Reports', (d.reports||[]).length,
      rows(d.reports||[], r => `
        <div class="row">
          <div class="r-title">${esc(r.title)}</div>
          <div class="r-meta">${esc(r.file)}${r.when ? ' · ' + esc(r.when) : ''}</div>
        </div>`),
      'No reports yet.', 'Use Run Synthesizer above to research a topic.'));

    // Built sites
    panels.push(panel('Built Sites', (d.sites||[]).length,
      rows(d.sites||[], s => `
        <div class="row">
          <div class="r-title"><a href="${esc(s.preview_url)}" target="_blank" rel="noopener">${esc(s.name)} &#8599;</a></div>
          <div class="r-sub">${s.pages} page${s.pages===1?'':'s'} · <span style="font-family:'SF Mono',monospace">${esc(s.slug)}</span></div>
          <div class="r-meta">${when(s.when)}</div>
        </div>`),
      'No sites built yet.', 'Use Build Website above to generate one.'));

    grid.innerHTML = panels.join('');
    refreshedEl.textContent = d.generated_at ? ('Updated ' + d.generated_at) : '';
  }

  async function load() {
    try {
      const res = await fetch('/api/home');
      if (res.status === 401) { location.href = '/login'; return; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      render(await res.json());
    } catch (e) {
      grid.innerHTML = `<div class="panel"><h2>Couldn't load</h2>
        <div class="empty">The dashboard couldn't reach the server (${esc(e.message)}).
        <span class="hint">It will retry automatically. Check that the app is running.</span></div></div>`;
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', load);
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
